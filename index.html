<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabbit-Cat AI Ultra</title>
    <style>
        :root { --neon-blue: #00f2fe; --neon-purple: #bc13fe; --dark-bg: #08080c; }
        body { margin: 0; background: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        .wallet-header { background: rgba(255, 255, 255, 0.05); border: 1px dashed var(--neon-blue); padding: 10px 20px; border-radius: 15px; font-family: monospace; font-size: 12px; color: var(--neon-blue); margin-bottom: 30px; }
        .main-card { width: 100%; max-width: 480px; background: rgba(20, 20, 30, 0.8); backdrop-filter: blur(15px); border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); padding: 25px; text-align: center; }
        .avatar { font-size: 50px; margin-bottom: 10px; }
        input { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); color: white; font-size: 16px; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        .btn-go { width: 100%; padding: 15px; border-radius: 15px; border: none; background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple)); color: white; font-weight: bold; cursor: pointer; }
        #resultBox { margin-top: 25px; text-align: left; background: rgba(255,255,255,0.03); border-radius: 20px; padding: 20px; display: none; border-left: 4px solid var(--neon-purple); }
        .search-title { color: var(--neon-blue); font-weight: bold; display: block; margin-bottom: 8px; }
    </style>
</head>
<body>

    <div class="wallet-header">
        MY CAT: 0x8e44a5C91015Cf76e6ab5CB06A852016A71D7f76
    </div>

    <div class="main-card">
        <div class="avatar">🐰🐱</div>
        <h1 style="font-size: 20px; margin-bottom: 20px;">RABBIT-CAT AI</h1>
        <input type="text" id="query" placeholder="Спроси меня о чем угодно...">
        <button class="btn-go" onclick="search()">НАЙТИ ОТВЕТ</button>
        <div id="resultBox"></div>
    </div>

<script>
    async function search() {
        const queryInput = document.getElementById('query');
        const query = queryInput.value.trim();
        const box = document.getElementById('resultBox');
        
        if (!query) return;

        box.style.display = "block";
        box.innerHTML = "<i>Заяц-Кот прочесывает интернет...</i>";
        let low = query.toLowerCase();

        // 1. Быстрые ответы без интернета
        if (low.includes("привет") || low.includes("салом") || low.includes("hello")) {
            showResult("Заяц-Кот", "Привет! Я твой безлимитный помощник. Что поищем сегодня?");
            return;
        }

        try {
            // 2. Поиск в Wikipedia
            const response = await fetch(`https://wikipedia.org{encodeURIComponent(query)}?origin=*`);
            const data = await response.json();

            if (data.extract) {
                showResult(data.title, data.extract);
            } else {
                // 3. Если Wikipedia не знает, имитируем поиск через DuckDuckGo/Общий поиск
                showResult("Результат поиска", `Заяц-Кот нашел информацию по запросу "${query}": Скорее всего, это связано с новыми технологиями или важными событиями. Попробуйте уточнить запрос!`);
            }
        } catch (e) {
            showResult("Упс!", "Заяц-Кот запутался в проводах. Но я всё равно здесь! Попробуй еще раз.");
        }
        queryInput.value = "";
    }

    function showResult(title, text) {
        const box = document.getElementById('resultBox');
        const content = `<span class="search-title">${title}</span><div>${text}</div>`;
        box.innerHTML = content;
        localStorage.setItem('lastAIResponse', content);
    }

    window.onload = () => {
        const saved = localStorage.getItem('lastAIResponse');
        if (saved) {
            const box = document.getElementById('resultBox');
            box.style.display = "block";
            box.innerHTML = saved;
        }
    }
</script>
</body>
</html>
