<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abdugani AI - VIP Edition</title>
    <style>
        :root { --blue: #00f2fe; --purple: #9d00ff; --dark: #0a0a12; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; box-sizing: border-box; }
        .card { width: 100%; max-width: 450px; background: rgba(255,255,255,0.05); padding: 30px 20px; border-radius: 35px; border: 1px solid var(--blue); text-align: center; backdrop-filter: blur(15px); position: relative; overflow: hidden; box-shadow: 0 0 25px rgba(0, 242, 254, 0.2); }
        .row { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .btn-l { background: transparent; border: 1px solid var(--blue); color: white; padding: 8px 15px; border-radius: 12px; cursor: pointer; }
        .btn-l.active { background: var(--blue); color: black; font-weight: bold; }
        input { width: 100%; padding: 15px; border-radius: 25px; border: 1px solid rgba(0,242,254,0.3); background: rgba(255,255,255,0.1); color: white; font-size: 16px; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        .go { width: 100%; padding: 16px; border-radius: 25px; border: none; background: linear-gradient(45deg, var(--blue), var(--purple)); color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
        .out { margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.6); border-radius: 15px; border-left: 4px solid var(--purple); text-align: left; display: none; line-height: 1.6; font-size: 14px; max-height: 300px; overflow-y: auto; }
        
        /* Стили Пэйволла */
        #payWall { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #0a0a12; z-index: 100; flex-direction: column; justify-content: center; 
            align-items: center; padding: 20px; box-sizing: border-box; border: 2px solid var(--purple);
        }
        .wallet-box { background: #111; padding: 12px; border-radius: 10px; font-size: 11px; color: var(--blue); margin: 15px 0; cursor: pointer; border: 1px dashed var(--blue); word-break: break-all; }
        .limit-text { color: #ff3333; font-weight: bold; font-size: 22px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div style="color:var(--blue); margin-bottom:10px; font-family:monospace;" id="clock">00:00:00</div>
    <div id="counter" style="font-size: 13px; color: #aaa; margin-bottom: 15px;">Бесплатных запросов: 10</div>
    
    <div class="row">
        <button class="btn-l active" onclick="setL('ru', this)">RU</button>
        <button class="btn-l" onclick="setL('uz', this)">UZ</button>
        <button class="btn-l" onclick="setL('en', this)">EN</button>
    </div>

    <input type="text" id="uIn" placeholder="Спроси меня о чем угодно...">
    <button class="go" id="mainBtn" onclick="askAI()">ОТПРАВИТЬ</button>
    <div class="out" id="res"></div>

    <!-- Окно оплаты -->
    <div id="payWall">
        <div class="limit-text">ЛИМИТ ИСЧЕРПАН</div>
        <p style="font-size: 14px;">Бесплатные попытки закончились. Для активации безлимита на год ($100) отправьте USDT (BEP20):</p>
        <div class="wallet-box" onclick="copyWallet()">0x8e44a5C91015Cf76e6ab5CB06A852016A71D7f76</div>
        <p style="font-size: 12px; color: #777;">Нажмите на адрес, чтобы скопировать</p>
        <button class="btn-l" onclick="location.reload()" style="margin-top: 20px;">Я оплатил</button>
    </div>
</div>

<script>
    let curL = 'ru';
    let count = 0;
    const maxRequests = 10;

    // Время
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

    function setL(l, b) {
        curL = l;
        document.querySelectorAll('.btn-l').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
    }

    function copyWallet() {
        navigator.clipboard.writeText("0x8e44a5C91015Cf76e6ab5CB06A852016A71D7f76");
        alert("Адрес кошелька скопирован!");
    }

    async function askAI() {
        const input = document.getElementById('uIn');
        const query = input.value.trim();
        const out = document.getElementById('res');
        const counterView = document.getElementById('counter');

        if (!query) return;

        // Проверка лимита
        if (count >= maxRequests) {
            document.getElementById('payWall').style.display = 'flex';
            return;
        }

        count++;
        counterView.innerText = `Бесплатных запросов: ${maxRequests - count}`;
        
        out.style.display = "block";
        out.innerText = "Ищу в интернете...";

        // Поиск через Wikipedia
        const lang = curL === 'uz' ? 'uz' : (curL === 'en' ? 'en' : 'ru');
        const url = `https://${lang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}?origin=*`;

        try {
            const response = await fetch(url);
            if (response.ok) {
                const data = await response.json();
                out.innerHTML = `<strong>${data.title}</strong><br>${data.extract}`;
            } else {
                out.innerText = "Я не нашел точного ответа, попробуйте другой вопрос.";
            }
        } catch (e) {
            out.innerText = "Ошибка связи с интернетом.";
        }
        
        input.value = ""; // Очистка поля
    }
</script>
</body>
</html>
