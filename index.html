<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abdugani AI Pro Max</title>
    <style>
        :root {
            --neon-blue: #00f2fe;
            --neon-purple: #9d00ff;
            --dark-bg: #0a0a12;
        }
        body {
            margin: 0; background: var(--dark-bg); color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 15px; box-sizing: border-box;
        }
        .ai-card {
            width: 100%; max-width: 450px; background: rgba(255, 255, 255, 0.05);
            padding: 30px 20px; border-radius: 30px; border: 1px solid rgba(0, 242, 254, 0.3);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.1); backdrop-filter: blur(15px);
            text-align: center;
        }
        .time { font-family: monospace; color: var(--neon-blue); font-size: 18px; margin-bottom: 10px; }
        .title { font-size: 26px; font-weight: 900; margin-bottom: 20px; text-transform: uppercase; }
        .title span { color: var(--neon-purple); text-shadow: 0 0 10px var(--neon-purple); }

        .row { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .btn-lang {
            background: transparent; border: 1px solid var(--neon-blue); color: white;
            padding: 6px 15px; border-radius: 10px; cursor: pointer; font-size: 14px; transition: 0.3s;
        }
        .btn-lang.active { background: var(--neon-blue); color: black; font-weight: bold; }

        select {
            width: 100%; background: #1a1a2e; color: white; border: 1px solid var(--neon-purple);
            padding: 10px; border-radius: 12px; margin-bottom: 20px; outline: none; font-size: 14px;
        }

        .input-group { position: relative; margin-bottom: 20px; }
        input {
            width: 100%; padding: 15px 20px; border-radius: 25px; border: none;
            font-size: 16px; outline: none; box-sizing: border-box; background: white; color: #333;
        }
        .go-btn {
            width: 100%; padding: 15px; border-radius: 25px; border: none;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            color: white; font-weight: bold; font-size: 18px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(157, 0, 255, 0.3);
        }

        .output {
            margin-top: 25px; padding: 15px; background: rgba(0,0,0,0.4);
            border-radius: 15px; border-left: 4px solid var(--neon-blue);
            text-align: left; display: none; font-size: 16px; line-height: 1.5;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="ai-card">
    <div class="time" id="clock">00:00:00</div>
    <div class="title">ABDUGANI <span>AI PRO 3</span></div>

    <!-- Выбор языка -->
    <div class="row">
        <button class="btn-lang active" onclick="changeL('ru', this)">RU</button>
        <button class="btn-lang" onclick="changeL('uz', this)">UZ</button>
        <button class="btn-lang" onclick="changeL('en', this)">EN</button>
    </div>

    <!-- Выбор голоса -->
    <select id="voiceList"><option>Загрузка голосов...</option></select>

    <div class="input-group">
        <input type="text" id="userInput" placeholder="Спроси меня о чем-то...">
    </div>
    <button class="go-btn" onclick="startAI()">ОТПРАВИТЬ (GO)</button>

    <div class="output" id="res"></div>
</div>

<script>
    let currentL = 'ru';
    let synth = window.speechSynthesis;
    let voices = [];

    // Часы
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

    // Работа с голосами
    function loadVoices() {
        voices = synth.getVoices();
        const select = document.getElementById('voiceList');
        select.innerHTML = '';
        voices.forEach((v, i) => {
            const opt = document.createElement('option');
            opt.textContent = `${v.name} (${v.lang})`;
            opt.value = i;
            select.appendChild(opt);
        });
    }
    if (speechSynthesis.onvoiceschanged !== undefined) { speechSynthesis.onvoiceschanged = loadVoices; }
    loadVoices();

    function changeL(l, btn) {
        currentL = l;
        document.querySelectorAll('.btn-lang').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const place = { ru: "Спросите меня...", uz: "Mendan so'rang...", en: "Ask me..." };
        document.getElementById('userInput').placeholder = place[l];
    }

    function startAI() {
        const val = document.getElementById('userInput').value.trim();
        const out = document.getElementById('res');
        if(!val) return;

        let answer = "";
        const responses = {
            ru: "Я тебя услышал! Это Abdugani AI. Я скоро научусь отвечать на: ",
            uz: "Sizni eshitdim! Bu Abdugani AI. Yaqin orada javob berishni o'rganaman: ",
            en: "I heard you! This is Abdugani AI. I will soon learn to answer: "
        };

        // Логика математики
        try {
            if(/[0-9]/.test(val) && /[+*/-]/.test(val)) {
                answer = (currentL === 'ru' ? "Результат: " : "Natija: ") + eval(val);
            } else {
                answer = responses[currentL] + val;
            }
        } catch(e) { answer = "Error"; }

        out.style.display = "block";
        out.innerText = answer;

        // Озвучка выбранным голосом
        synth.cancel();
        const speech = new SpeechSynthesisUtterance(answer);
        const selectedVoiceIdx = document.getElementById('voiceList').value;
        if(voices[selectedVoiceIdx]) speech.voice = voices[selectedVoiceIdx];
        synth.speak(speech);
    }
</script>

</body>
</html>
