<!DOCTYPE html>
<html lang="ru">
<head
<meta name="description" content="Abdugani AI - умный помощник на узбекском, русском и английском языках.">
<meta name="keywords" content="Abdugani AI, ИИ Абдугани, умный помощник, чат бот">
<meta name="author" content="Abdugani">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abdugani AI - 3 Languages</title>
    <style>
        :root { --blue: #00f2fe; --purple: #9d00ff; --dark: #0a0a12; }
        body { margin: 0; background: var(--dark); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; box-sizing: border-box; }
        .card { width: 100%; max-width: 450px; background: rgba(255,255,255,0.05); padding: 30px 20px; border-radius: 30px; border: 1px solid var(--blue); text-align: center; backdrop-filter: blur(15px); }
        .title { font-size: 22px; font-weight: 900; margin-bottom: 20px; text-transform: uppercase; }
        .title span { color: var(--purple); }
        .row { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .btn-l { background: transparent; border: 1px solid var(--blue); color: white; padding: 8px 15px; border-radius: 12px; cursor: pointer; }
        .btn-l.active { background: var(--blue); color: black; font-weight: bold; }
        select { width: 100%; background: #1a1a2e; color: white; border: 1px solid var(--purple); padding: 10px; border-radius: 15px; margin-bottom: 20px; outline: none; }
        input { width: 100%; padding: 15px; border-radius: 25px; border: none; font-size: 16px; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        .go { width: 100%; padding: 15px; border-radius: 25px; border: none; background: linear-gradient(45deg, var(--blue), var(--purple)); color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
        .out { margin-top: 25px; padding: 20px; background: rgba(0,0,0,0.5); border-radius: 15px; border-left: 4px solid var(--blue); text-align: left; display: none; line-height: 1.6; }
    </style>
</head>
<body>

<div class="card">
    <div id="clock" style="color:var(--blue); margin-bottom:10px; font-family:monospace;">00:00:00</div>
    <div class="title">ABDUGANI <span>TRIPLE AI</span></div>

    <div class="row">
        <button class="btn-l active" onclick="setL('ru', this)">RU</button>
        <button class="btn-l" onclick="setL('uz', this)">UZ</button>
        <button class="btn-l" onclick="setL('en', this)">EN</button>
    </div>

    <select id="vList"><option>Загрузка голосов...</option></select>
    <input type="text" id="uIn" placeholder="Напиши что-нибудь...">
    <button class="go" onclick="runAI()">GO</button>
    <div class="out" id="res"></div>
</div>

<script>
    let curL = 'ru';
    let synth = window.speechSynthesis;
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

    function setL(l, b) {
        curL = l;
        document.querySelectorAll('.btn-l').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
        const p = { ru: "Спроси меня...", uz: "Mendan so'rang...", en: "Ask me..." };
        document.getElementById('uIn').placeholder = p[l];
    }

    function loadV() {
        let vs = synth.getVoices();
        const sel = document.getElementById('vList');
        sel.innerHTML = '';
        vs.forEach((v, i) => {
            let o = document.createElement('option');
            o.textContent = `${v.name} (${v.lang})`;
            o.value = i;
            sel.appendChild(o);
        });
    }
    if (speechSynthesis.onvoiceschanged !== undefined) { speechSynthesis.onvoiceschanged = loadV; }
    loadV();

    // БОЛЬШАЯ БАЗА ДАННЫХ ДЛЯ ВСЕХ ЯЗЫКОВ
    const brain = {
        "ru": {
            "привет": "Привет! Я Abdugani AI. Как твои дела?",
            "как ты": "Я чувствую себя отлично! Готов отвечать на вопросы.",
            "кто ты": "Я умный помощник, созданный Абдугани.",
            "пирамид": "Секрет пирамид кроется в их идеальной математической точности.",
            "эйнштейн": "Альберт Эйнштейн — великий физик, открывший теорию относительности."
        },
        "uz": {
            "salom": "Salom! Men Abdugani AI tizimiman. Ishlaringiz yaxshimi?",
            "qandaysan": "Men juda yaxshiman! Savollaringizga javob berishga tayyorman.",
            "kim san": "Men Abdugani tomonidan yaratilgan aqlli yordamchiman.",
            "exrom": "Exromlar siri ularning mukammal matematik aniqligidadir.",
            "eynshteyn": "Albert Eynshteyn — nisbiylik nazariyasini kashf etgan buyuk fizik."
        },
        "en": {
            "hello": "Hello! I am Abdugani AI. How are you doing today?",
            "hi": "Hi there! Ready to help you with anything.",
            "how are you": "I'm doing fantastic! My systems are running perfectly.",
            "who are you": "I am a smart assistant created by Abdugani.",
            "pyramid": "The secret of the pyramids lies in their perfect mathematical alignment.",
            "einstein": "Albert Einstein was a brilliant physicist who developed the theory of relativity."
        }
    };

    function runAI() {
        const val = document.getElementById('uIn').value.toLowerCase().trim();
        const out = document.getElementById('res');
        let ans = "";

        let found = false;
        let langData = brain[curL];

        for (let key in langData) {
            if (val.includes(key)) {
                ans = langData[key];
                found = true;
                break;
            }
        }

        if (!found) {
            try {
                if (/[0-9]/.test(val)) { ans = (curL==='en'?"Result: ":(curL==='uz'?"Natija: ":"Результат: ")) + eval(val.replace(/[^-0-9+*/.]/g, '')); }
                else { 
                    const no = { ru: "Я пока не знаю этого, но скоро выучу!", uz: "Buni hali bilmayman, lekin tezda o'rganaman!", en: "I don't know this yet, but I'll learn soon!" };
                    ans = no[curL];
                }
            } catch { ans = "Error"; }
        }

        out.style.display = "block";
        out.innerText = ans;

        synth.cancel();
        let s = new SpeechSynthesisUtterance(ans);
        if(curL === 'ru') s.lang = 'ru-RU';
        if(curL === 'uz') s.lang = 'uz-UZ';
        if(curL === 'en') s.lang = 'en-US';
        
        let v = synth.getVoices()[document.getElementById('vList').value];
        if(v) s.voice = v;
        synth.speak(s);
    }
</script>
</body>
</html>
