<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abdugani AI Mirror Pro</title>
    <style>
        :root { --blue: #00f2fe; --purple: #9d00ff; --dark: #0a0a12; }
        body { margin: 0; background: var(--dark); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; box-sizing: border-box; }
        .card { width: 100%; max-width: 450px; background: rgba(255,255,255,0.05); padding: 30px 20px; border-radius: 30px; border: 1px solid var(--blue); text-align: center; backdrop-filter: blur(15px); box-shadow: 0 0 20px rgba(0,242,254,0.2); }
        .title { font-size: 22px; font-weight: 900; margin-bottom: 20px; text-transform: uppercase; }
        .title span { color: var(--purple); }
        .row { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .btn-l { background: transparent; border: 1px solid var(--blue); color: white; padding: 8px 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .btn-l.active { background: var(--blue); color: black; font-weight: bold; }
        select { width: 100%; background: #1a1a2e; color: white; border: 1px solid var(--purple); padding: 10px; border-radius: 15px; margin-bottom: 20px; outline: none; }
        input { width: 100%; padding: 15px; border-radius: 25px; border: none; font-size: 16px; margin-bottom: 15px; outline: none; box-sizing: border-box; color: #333; }
        .go { width: 100%; padding: 15px; border-radius: 25px; border: none; background: linear-gradient(45deg, var(--blue), var(--purple)); color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
        .out { margin-top: 25px; padding: 20px; background: rgba(0,0,0,0.5); border-radius: 15px; border-left: 4px solid var(--blue); text-align: left; display: none; line-height: 1.6; }
    </style>
</head>
<body>

<div class="card">
    <div id="clock" style="color:var(--blue); margin-bottom:10px; font-family:monospace;">00:00:00</div>
    <div class="title">ABDUGANI <span>SMART AI</span></div>

    <div class="row">
        <button class="btn-l active" onclick="setL('ru', this)">RU</button>
        <button class="btn-l" onclick="setL('uz', this)">UZ</button>
        <button class="btn-l" onclick="setL('en', this)">EN</button>
    </div>

    <select id="vList"><option>Loading voices...</option></select>
    <input type="text" id="uIn" placeholder="Напишите сообщение...">
    <button class="go" onclick="runAI()">ОТПРАВИТЬ (GO)</button>
    <div class="out" id="res"></div>
</div>

<script>
    let curL = 'ru';
    let synth = window.speechSynthesis;
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

    function setL(l, b) {
        curL = l;
        document.querySelectorAll('.btn-l').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
        const p = { ru: "Напишите привет...", uz: "Salom deb yozing...", en: "Type hello..." };
        document.getElementById('uIn').placeholder = p[l];
    }

    function loadV() {
        let vs = synth.getVoices();
        const sel = document.getElementById('vList');
        sel.innerHTML = '';
        vs.forEach((v, i) => {
            let o = document.createElement('option');
            o.textContent = `${v.name} (${v.lang})`;
            o.value = i;
            sel.appendChild(o);
        });
    }
    if (speechSynthesis.onvoiceschanged !== undefined) { speechSynthesis.onvoiceschanged = loadV; }
    loadV();

    // РАСШИРЕННЫЙ СЛОВАРЬ (BRAIN)
    const brain = {
        "ru": {
            "привет": "Привет! Я твой ИИ. Чем могу помочь?",
            "как ты": "У меня всё отлично, мои системы в норме!",
            "кто ты": "Я — Abdugani AI, твой персональный помощник.",
            "пирамид": "Пирамиды Египта — это величайшая тайна древности.",
            "эйнштейн": "Альберт Эйнштейн — физик, создавший теорию относительности."
        },
        "uz": {
            "salom": "Salom! Men Abdugani AI tizimiman. Sizga qanday yordam berishim mumkin?",
            "qandaysan": "Men juda yaxshiman, algoritmlarim alo darajada ishlamoqda!",
            "kim san": "Men — Abdugani AI, sening aqlli yordamchingman.",
            "exrom": "Misr exromlari - qadimgi dunyoning eng katta sirlaridan biridir.",
            "eynshteyn": "Albert Eynshteyn — nisbiylik nazariyasini yaratgan buyuk fizik."
        },
        "en": {
            "hello": "Hello! I am Abdugani AI. How can I assist you today?",
            "hi": "Hi there! I'm ready to help you with your questions.",
            "how are you": "I'm doing great! My systems are running at 100%.",
            "who are you": "I am Abdugani AI, your personal smart assistant.",
            "pyramid": "The pyramids of Giza are one of the greatest mysteries of the world.",
            "einstein": "Albert Einstein was a genius physicist who developed the theory of relativity."
        }
    };

    function runAI() {
        const val = document.getElementById('uIn').value.toLowerCase().trim();
        const out = document.getElementById('res');
        let ans = "";

        // Поиск ответа строго в выбранном языке
        let found = false;
        let langData = brain[curL];

        for (let key in langData) {
            if (val.includes(key)) {
                ans = langData[key];
                found = true;
                break;
            }
        }

        if (!found) {
            // Математика (работает всегда)
            try {
                if (/[0-9]/.test(val) && /[+*/-]/.test(val)) {
                    const prefix = { ru: "Результат: ", uz: "Natija: ", en: "Result: " };
                    ans = prefix[curL] + eval(val.replace(/[^-0-9+*/.]/g, ''));
                } else {
                    const no = { 
                        ru: "Я пока не знаю ответа на этот вопрос.", 
                        uz: "Hozircha bu savolga javobim yo'q.", 
                        en: "I don't have an answer to this question yet." 
                    };
                    ans = no[curL];
                }
            } catch { ans = "Error / Ошибка / Xato"; }
        }

        out.style.display = "block";
        out.innerText = ans;

        // Голос
        synth.cancel();
        let s = new SpeechSynthesisUtterance(ans);
        // Установка языка для синтезатора
        if(curL === 'ru') s.lang = 'ru-RU';
        if(curL === 'uz') s.lang = 'uz-UZ';
        if(curL === 'en') s.lang = 'en-US';

        let v = synth.getVoices()[document.getElementById('vList').value];
        if(v) s.voice = v;
        synth.speak(s);
    }
</script>
</body>
</html>
