<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abdugani AI - Final</title>
    <style>
        :root { --blue: #00f2fe; --purple: #9d00ff; --dark: #0a0a12; }
        body { margin: 0; background: var(--dark); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; box-sizing: border-box; overflow: hidden; }
        .card { width: 100%; max-width: 450px; background: rgba(255,255,255,0.05); padding: 30px 20px; border-radius: 35px; border: 1px solid var(--blue); text-align: center; backdrop-filter: blur(15px); position: relative; }
        .row { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .btn-l { background: transparent; border: 1px solid var(--blue); color: white; padding: 8px 15px; border-radius: 12px; cursor: pointer; }
        .btn-l.active { background: var(--blue); color: black; font-weight: bold; }
        input { width: 100%; padding: 15px; border-radius: 25px; border: 1px solid var(--blue); background: rgba(0,0,0,0.3); color: white; font-size: 16px; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        .go { width: 100%; padding: 16px; border-radius: 25px; border: none; background: linear-gradient(45deg, var(--blue), var(--purple)); color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
        .out { margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.6); border-radius: 15px; border-left: 4px solid var(--purple); text-align: left; display: none; line-height: 1.6; max-height: 200px; overflow-y: auto; }
        #payWall { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a12; z-index: 999; flex-direction: column; justify-content: center; align-items: center; padding: 25px; box-sizing: border-box; }
        .scanner { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--blue); display: flex; align-items: center; justify-content: center; position: relative; margin-top: 20px; cursor: pointer; background: rgba(0, 242, 254, 0.1); }
        .scan-line { width: 100%; height: 2px; background: var(--blue); position: absolute; top: 0; display: none; animation: scan 1.5s linear infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>

<div class="card">
    <div style="color:var(--blue); margin-bottom:10px; font-family:monospace;" id="clock">00:00:00</div>
    <div id="counter" style="font-size: 12px; color: #aaa; margin-bottom: 10px;">Шансов: 10</div>
    
    <div class="row" onclick="activateMaster()">
        <button class="btn-l active">RU</button>
        <button class="btn-l">UZ</button>
        <button class="btn-l">EN</button>
    </div>

    <input type="text" id="uIn" placeholder="Спроси или посчитай...">
    <button class="go" onclick="runAI()">GO</button>
    <div class="out" id="res"></div>

    <div id="payWall">
        <h2 style="color:#ff3333; margin:0;">ЛИМИТ ИСЧЕРПАН</h2>
        <div style="font-size:24px; margin:10px 0;">$5,000</div>
        <p id="timerMsg" style="font-size:14px; color:var(--blue);">Ждите 1 час или подтвердите личность</p>
        <div class="scanner" onmousedown="startScan()" onmouseup="stopScan()" ontouchstart="startScan()" ontouchend="stopScan()">
            <div class="scan-line" id="line"></div>
            <svg style="width:40px; fill:var(--blue);" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
        </div>
        <p style="font-size:10px; color:#444; margin-top:20px;">0x8e44a5C91015Cf76e6ab5CB06A852016A71D7f76</p>
    </div>
</div>

<script>
    let qCount = parseInt(localStorage.getItem('qCount') || 0);
    let masterMode = false;
    let scanTimer;

    // Время и проверка таймера блокировки
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        const blockUntil = localStorage.getItem('blockUntil');
        if (blockUntil) {
            const diff = blockUntil - new Date().getTime();
            if (diff > 0) {
                document.getElementById('payWall').style.display = 'flex';
                let m = Math.floor(diff / 60000);
                let s = Math.floor((diff % 60000) / 1000);
                document.getElementById('timerMsg').innerText = `До разблокировки: ${m}м ${s}с`;
            } else {
                resetSystem();
            }
        }
    }, 1000);

    function activateMaster() { masterMode = true; setTimeout(() => { masterMode = false; }, 4000); }

    function startScan() {
        document.getElementById('line').style.display = 'block';
        scanTimer = setTimeout(() => {
            if (masterMode) {
                alert("Личность подтверждена, Создатель!");
                resetSystem();
            } else {
                alert("Ошибка: Данные не совпадают. Ждите окончания часа или платите.");
            }
            stopScan();
        }, 3000);
    }

    function stopScan() { clearTimeout(scanTimer); document.getElementById('line').style.display = 'none'; }

    function resetSystem() {
        localStorage.removeItem('blockUntil');
        localStorage.setItem('qCount', 0);
        qCount = 0;
        document.getElementById('payWall').style.display = 'none';
        document.getElementById('counter').innerText = "Шансов: 10";
    }

    async function runAI() {
        const input = document.getElementById('uIn');
        const out = document.getElementById('res');
        let val = input.value.trim();
        if (!val || qCount >= 10) return;

        qCount++;
        localStorage.setItem('qCount', qCount);
        document.getElementById('counter').innerText = "Шансов: " + (10 - qCount);
        out.style.display = "block";
        out.innerText = "Ищу ответ...";

        // Приветствие
        let lowVal = val.toLowerCase();
        if (lowVal === "привет" || lowVal === "hello" || lowVal === "salom") {
            out.innerText = "Привет, здравствуйте! Как ваши дела?";
            return;
        }

        // Математика
        let calcExpr = val.replace(/×/g, '*').replace(/x/g, '*').replace(/÷/g, '/');
        if (/^[0-9+\-*/().\s*]+$/.test(calcExpr) && /[0-9]/.test(calcExpr)) {
            try { out.innerText = "Результат: " + eval(calcExpr); return; } catch(e) {}
        }

        // Интернет (Википедия)
        try {
            const r = await fetch(`https://wikipedia.org{encodeURIComponent(val)}?origin=*`);
            const d = await r.json();
            out.innerHTML = d.extract ? `<b>${d.title}</b><br>${d.extract}` : "Ничего не найдено.";
        } catch(e) { out.innerText = "Ошибка сети."; }

        if (qCount >= 10) {
            localStorage.setItem('blockUntil', new Date().getTime() + 3600000); // Блок на 1 час
        }
    }
    
    document.getElementById('counter').innerText = "Шансов: " + (10 - qCount);
</script>
</body>
</html>
