<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abdugani Polyglot AI</title>
    <style>
        :root { --blue: #00f2fe; --purple: #9d00ff; --dark: #0a0a12; }
        body { margin: 0; background: var(--dark); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; box-sizing: border-box; }
        .card { width: 100%; max-width: 450px; background: rgba(255,255,255,0.05); padding: 30px 20px; border-radius: 30px; border: 1px solid var(--blue); text-align: center; backdrop-filter: blur(15px); box-shadow: 0 0 20px rgba(0,242,254,0.2); }
        .title { font-size: 22px; font-weight: 900; margin-bottom: 20px; text-transform: uppercase; color: white; }
        .title span { color: var(--purple); }
        .row { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .btn-l { background: transparent; border: 1px solid var(--blue); color: white; padding: 8px 15px; border-radius: 12px; cursor: pointer; }
        .btn-l.active { background: var(--blue); color: black; font-weight: bold; }
        select { width: 100%; background: #1a1a2e; color: white; border: 1px solid var(--purple); padding: 10px; border-radius: 15px; margin-bottom: 20px; outline: none; }
        input { width: 100%; padding: 15px; border-radius: 25px; border: none; font-size: 16px; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        .go { width: 100%; padding: 15px; border-radius: 25px; border: none; background: linear-gradient(45deg, var(--blue), var(--purple)); color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
        .out { margin-top: 25px; padding: 20px; background: rgba(0,0,0,0.5); border-radius: 15px; border-left: 4px solid var(--purple); text-align: left; display: none; line-height: 1.6; font-size: 17px; }
    </style>
</head>
<body>

<div class="card">
    <div id="clock" style="color:var(--blue); margin-bottom:10px; font-family:monospace;">00:00:00</div>
    <div class="title">ABDUGANI <span>POLYGLOT AI</span></div>

    <div class="row">
        <button class="btn-l active" onclick="setL('ru', this)">RU</button>
        <button class="btn-l" onclick="setL('uz', this)">UZ</button>
        <button class="btn-l" onclick="setL('en', this)">EN</button>
    </div>

    <select id="vList"><option>Loading...</option></select>
    <input type="text" id="uIn" placeholder="Напиши: Привет, Salom или Hello">
    <button class="go" onclick="runAI()">GO / START</button>
    <div class="out" id="res"></div>
</div>

<script>
    let curL = 'ru';
    let synth = window.speechSynthesis;
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

    function setL(l, b) {
        curL = l;
        document.querySelectorAll('.btn-l').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
    }

    function loadV() {
        let vs = synth.getVoices();
        const sel = document.getElementById('vList');
        sel.innerHTML = '';
        vs.forEach((v, i) => {
            let o = document.createElement('option');
            o.textContent = `${v.name} (${v.lang})`;
            o.value = i;
            sel.appendChild(o);
        });
    }
    if (speechSynthesis.onvoiceschanged !== undefined) { speechSynthesis.onvoiceschanged = loadV; }
    loadV();

    // МОЗГ С МУЛЬТИЯЗЫЧНЫМИ ОТВЕТАМИ
    const data = {
        greetings: {
            keys: ["привет", "salom", "hello", "hi", "hey", "ассалому", "прив"],
            all: "Привет! 👋 | Salom! 🤝 | Hello! 🚀"
        },
        howareyou: {
            keys: ["как ты", "qandaysan", "how are you", "ishlar", "how it going"],
            all: "Всё отлично! | Hammasi zo'r! | Everything is great!"
        },
        whoareyou: {
            keys: ["кто ты", "kim san", "who are you"],
            all: "Я — Abdugani AI. | Men — Abdugani AI. | I am Abdugani AI."
        }
    };

    function runAI() {
        const val = document.getElementById('uIn').value.toLowerCase().trim();
        const out = document.getElementById('res');
        let ans = "";

        let found = false;
        for (let id in data) {
            if (data[id].keys.some(k => val.includes(k))) {
                ans = data[id].all; // Выдает ответ на всех языках сразу!
                found = true; break;
            }
        }

        if (!found) {
            try {
                if (/[0-9]/.test(val)) { ans = "Calc: " + eval(val.replace(/[^-0-9+*/.]/g, '')); }
                else { 
                    const no = { ru: "Я пока учусь...", uz: "Hali o'rganyapman...", en: "Still learning..." };
                    ans = no[curL];
                }
            } catch { ans = "Error"; }
        }

        out.style.display = "block";
        out.innerText = ans;
        
        synth.cancel();
        let s = new SpeechSynthesisUtterance(ans);
        let v = synth.getVoices()[document.getElementById('vList').value];
        if(v) s.voice = v;
        synth.speak(s);
    }
</script>
</body>
</html>
