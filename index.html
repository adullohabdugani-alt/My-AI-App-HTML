<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdugani AI Pro Max 3 - Gemini Style</title>
    <style>
        :root {
            --gemini-gradient: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
            --bg-color: #131314;
            --card-bg: #1e1f20;
            --text-main: #e3e3e3;
        }

        body {
            margin: 0; background-color: var(--bg-color);
            color: var(--text-main); font-family: 'Google Sans', Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* Верхняя панель с твоим кодом кошелька */
        .header {
            width: 100%; padding: 15px; display: flex; justify-content: space-between;
            align-items: center; box-sizing: border-box; font-size: 12px; opacity: 0.7;
        }
        .wallet { font-family: monospace; color: #4285f4; border: 1px solid #4285f4; padding: 5px 10px; border-radius: 20px; }

        .container {
            width: 90%; max-width: 800px; margin-top: 50px; text-align: center;
        }

        .ai-name {
            font-size: 32px; font-weight: bold; margin-bottom: 40px;
            background: var(--gemini-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Поле ввода в стиле Gemini */
        .input-area {
            background: var(--card-bg); border-radius: 30px; padding: 10px 20px;
            display: flex; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 30px; border: 1px solid transparent; transition: 0.3s;
        }
        .input-area:focus-within { border-color: #4285f4; background: #282a2c; }

        input {
            flex: 1; background: transparent; border: none; color: white;
            padding: 15px; font-size: 16px; outline: none;
        }

        .send-btn {
            background: none; border: none; cursor: pointer; padding: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        .send-btn svg { fill: #4285f4; transition: 0.3s; }
        .send-btn:hover svg { fill: #9b72cb; }

        /* Область ответа */
        #answer-box {
            width: 100%; text-align: left; padding: 20px; border-radius: 20px;
            background: rgba(255,255,255,0.02); display: none; line-height: 1.6;
            animation: fadeIn 0.6s ease;
        }

        .sticker { font-size: 40px; margin-bottom: 10px; }
        .source-tag { font-size: 10px; color: #80868b; text-transform: uppercase; margin-bottom: 10px; display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">
        <div>Abdugani AI <span style="color:var(--gold)">Pro Max 3</span></div>
        <div class="wallet">0x8e44a5C91015Cf76e6ab5CB06A852016A71D7f76</div>
    </div>

    <div class="container">
        <div class="ai-name">Привет, я Abdugani AI</div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Введите запрос или имя человека..." onkeypress="if(event.key==='Enter') ask()">
            <button class="send-btn" onclick="ask()">
                <svg width="24" height="24" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>

        <div id="answer-box"></div>
    </div>

<script>
    async function ask() {
        const input = document.getElementById('userInput');
        const box = document.getElementById('answer-box');
        const q = input.value.trim();
        
        if (!q) return;

        box.style.display = "block";
        box.innerHTML = `<div class="sticker">🤖</div><i>Ищу в интернете специально для тебя...</i>`;
        input.value = "";

        try {
            // Подключение к интернету (Wikipedia API)
            const r = await fetch(`https://wikipedia.org{encodeURIComponent(q)}?origin=*`);
            const d = await r.json();

            if (d.extract) {
                box.innerHTML = `
                    <span class="source-tag">Найдено в глобальной сети</span>
                    <div class="sticker">✨</div>
                    <h2 style="margin-top:0; color:#4285f4;">${d.title}</h2>
                    <div>${d.extract}</div>
                `;
            } else {
                box.innerHTML = `<div class="sticker">🤔</div>Я просмотрел интернет, но по запросу "${q}" ничего конкретного не нашёл. Попробуй спросить про известного человека или термин.`;
            }
        } catch (e) {
            box.innerHTML = `<div class="sticker">⚠️</div> Ошибка связи. Проверь интернет-соединение.`;
        }
    }
</script>

</body>
</html>
