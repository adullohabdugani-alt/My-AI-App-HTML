<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Abdugani AI - Умный помощник и VIP возможности.">
    <link rel="icon" href="https://flaticon.com" type="image/png">
    <title>Abdugani AI PRO MAX</title>
    <style>
        :root { --blue: #00f2fe; --purple: #9d00ff; --dark: #0a0a12; }
        body { margin: 0; background: var(--dark); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; box-sizing: border-box; }
        .card { width: 100%; max-width: 450px; background: rgba(255,255,255,0.05); padding: 30px 20px; border-radius: 35px; border: 1px solid var(--blue); text-align: center; backdrop-filter: blur(15px); box-shadow: 0 0 30px rgba(0,242,254,0.2); }
        .title { font-size: 24px; font-weight: 900; margin-bottom: 20px; text-transform: uppercase; }
        .title span { color: var(--purple); }
        .row { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .btn-l { background: transparent; border: 1px solid var(--blue); color: white; padding: 8px 15px; border-radius: 12px; cursor: pointer; }
        .btn-l.active { background: var(--blue); color: black; font-weight: bold; }
        input { width: 100%; padding: 15px; border-radius: 25px; border: none; font-size: 16px; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        .go { width: 100%; padding: 16px; border-radius: 25px; border: none; background: linear-gradient(45deg, var(--blue), var(--purple)); color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
        
        /* КНОПКА VIP ОПЛАТЫ */
        .vip-card { margin-top: 25px; padding: 15px; background: rgba(157, 0, 255, 0.1); border-radius: 20px; border: 1px dashed var(--purple); }
        .wallet-box { background: #000; padding: 10px; border-radius: 10px; font-size: 10px; color: var(--blue); margin: 10px 0; cursor: pointer; word-break: break-all; }
    </style>
</head>
<body>

<div class="card">
    <div class="title">ABDUGANI <span>AI PRO</span></div>
    
    <div class="row">
        <button class="btn-l active" onclick="setL('ru', this)">RU</button>
        <button class="btn-l" onclick="setL('uz', this)">UZ</button>
        <button class="btn-l" onclick="setL('en', this)">EN</button>
    </div>

    <input type="text" id="uIn" placeholder="Спроси меня...">
    <button class="go" onclick="runAI()">GO</button>

    <!-- БЛОК ОПЛАТЫ -->
    <div class="vip-card">
        <div style="color:#ffcc00; font-weight:bold; margin-bottom:5px;">💎 VIP ДОСТУП</div>
        <div style="font-size:12px; color:#ccc;">Нажми на адрес, чтобы скопировать и отправить донат (USDC BEP20):</div>
        <div class="wallet-box" onclick="copyW()">0x8e44a5C91015Cf76e6ab5CB06A852016A71D7f76</div>
        <div id="status" style="font-size:10px; color:var(--purple); display:none;">✅ Адрес скопирован!</div>
    </div>
</div>

<script>
    let curL = 'ru';
    function setL(l, b) {
        curL = l;
        document.querySelectorAll('.btn-l').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
    }

    function copyW() {
        navigator.clipboard.writeText("0x8e44a5C91015Cf76e6ab5CB06A852016A71D7f76");
        document.getElementById('status').style.display = 'block';
        setTimeout(() => { document.getElementById('status').style.display = 'none'; }, 2000);
    }

    function runAI() {
        alert(curL === 'ru' ? "Анализирую..." : "Tahlil qilinmoqda...");
    }
</script>

</body>
</html>
