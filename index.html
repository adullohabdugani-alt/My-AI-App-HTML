<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abdugani AI - Search Edition</title>
    <style>
        :root { --blue: #00f2fe; --purple: #9d00ff; --dark: #0a0a12; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; box-sizing: border-box; }
        .card { width: 100%; max-width: 450px; background: rgba(255,255,255,0.05); padding: 30px 20px; border-radius: 35px; border: 1px solid var(--blue); text-align: center; backdrop-filter: blur(15px); position: relative; overflow: hidden; box-shadow: 0 0 20px rgba(0, 242, 254, 0.2); }
        .row { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .btn-l { background: transparent; border: 1px solid var(--blue); color: white; padding: 8px 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .btn-l.active { background: var(--blue); color: black; font-weight: bold; }
        input { width: 100%; padding: 15px; border-radius: 25px; border: 1px solid rgba(0,242,254,0.3); background: rgba(255,255,255,0.1); color: white; font-size: 16px; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--purple); }
        .go { width: 100%; padding: 16px; border-radius: 25px; border: none; background: linear-gradient(45deg, var(--blue), var(--purple)); color: white; font-weight: bold; font-size: 18px; cursor: pointer; transition: transform 0.2s; }
        .go:active { transform: scale(0.98); }
        .out { margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.6); border-radius: 15px; border-left: 4px solid var(--purple); text-align: left; display: none; line-height: 1.6; font-size: 14px; max-height: 300px; overflow-y: auto; }
        .loading { display: none; color: var(--blue); font-style: italic; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div style="color:var(--blue); margin-bottom:10px; font-family:monospace; letter-spacing: 2px;" id="clock">00:00:00</div>
    
    <div class="row">
        <button class="btn-l active" onclick="setL('ru', this)">RU</button>
        <button class="btn-l" onclick="setL('uz', this)">UZ</button>
        <button class="btn-l" onclick="setL('en', this)">EN</button>
    </div>

    <input type="text" id="uIn" placeholder="Что найти в интернете?">
    <div id="loader" class="loading">Ищу информацию...</div>
    <button class="go" onclick="searchInternet()">ПОИСК</button>
    
    <div class="out" id="res"></div>
</div>

<script>
    let curL = 'ru';
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

    function setL(l, b) {
        curL = l;
        document.querySelectorAll('.btn-l').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
        document.getElementById('uIn').placeholder = l === 'ru' ? "Что найти в интернете?" : (l === 'uz' ? "Internetdan nima izlaymiz?" : "Search anything...");
    }

    async function searchInternet() {
        const query = document.getElementById('uIn').value.trim();
        const out = document.getElementById('res');
        const loader = document.getElementById('loader');

        if (!query) return;

        // Показываем загрузку
        loader.style.display = "block";
        out.style.display = "none";

        try {
            /* 
               ВНИМАНИЕ: Для реального поиска используется API. 
               Здесь используется DuckDuckGo (бесплатный и простой способ для примера)
            */
            const response = await fetch(`https://duckduckgo.com{encodeURIComponent(query)}&format=json&pretty=1&no_html=1`);
            const data = await response.json();

            let text = "";
            if (data.AbstractText) {
                text = data.AbstractText;
            } else if (data.RelatedTopics && data.RelatedTopics.length > 0) {
                text = data.RelatedTopics[0].Text;
            } else {
                text = curL === 'ru' ? "К сожалению, я ничего не нашел по этому запросу." : "Hech narsa topilmadi.";
            }

            out.innerText = text;
            out.style.display = "block";
        } catch (error) {
            out.innerText = "Ошибка соединения с интернетом.";
            out.style.display = "block";
        } finally {
            loader.style.display = "none";
        }
    }
</script>
</body>
</html>
