<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abdugani AI</title>
    <style>
        :root { --blue: #00f2fe; --purple: #9d00ff; --dark: #0a0a12; }
        body { margin: 0; background: var(--dark); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; box-sizing: border-box; }
        .card { width: 100%; max-width: 450px; background: rgba(255,255,255,0.05); padding: 30px 20px; border-radius: 35px; border: 1px solid var(--blue); text-align: center; backdrop-filter: blur(15px); position: relative; }
        .row { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .btn-l { background: transparent; border: 1px solid var(--blue); color: white; padding: 8px 15px; border-radius: 12px; cursor: pointer; }
        .btn-l.active { background: var(--blue); color: black; font-weight: bold; }
        input { width: 100%; padding: 15px; border-radius: 25px; border: 1px solid var(--blue); background: rgba(0,0,0,0.3); color: white; font-size: 16px; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        .go { width: 100%; padding: 16px; border-radius: 25px; border: none; background: linear-gradient(45deg, var(--blue), var(--purple)); color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
        .out { margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.6); border-radius: 15px; border-left: 4px solid var(--purple); text-align: left; display: none; line-height: 1.6; }
        #payWall { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a12; z-index: 999; flex-direction: column; justify-content: center; align-items: center; padding: 25px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="card">
    <!-- СЕКРЕТ: Нажми дважды на часы, чтобы сбросить лимит -->
    <div style="color:var(--blue); margin-bottom:10px; font-family:monospace; cursor:pointer;" id="clock" ondblclick="unlockCreator()">00:00:00</div>
    <div id="counter" style="font-size: 12px; color: #aaa; margin-bottom: 15px;">Шансов: 10</div>
    
    <div class="row">
        <button class="btn-l active" onclick="setL('ru', this)">RU</button>
        <button class="btn-l" onclick="setL('uz', this)">UZ</button>
        <button class="btn-l" onclick="setL('en', this)">EN</button>
    </div>

    <input type="text" id="uIn" placeholder="Спроси или посчитай...">
    <button class="go" onclick="runAI()">GO</button>
    <div class="out" id="res"></div>

    <div id="payWall">
        <div style="color:#ff3333; font-weight:bold; font-size:22px;">ЛИМИТ ИСЧЕРПАН</div>
        <div style="font-size:30px; margin:10px 0;">$5,000</div>
        <p style="font-size:14px;">Отправьте оплату на кошелек или ждите 1 час:</p>
        <div style="background:#000; padding:10px; border-radius:10px; font-size:10px; color:var(--blue); margin:15px 0; border:1px dashed var(--blue); word-break:break-all; width:90%;" onclick="copyW()">0x8e44a5C91015Cf76e6ab5CB06A852016A71D7f76</div>
        <div id="timeLeft" style="color:var(--blue); font-family:monospace;"></div>
    </div>
</div>

<script>
    let curL = 'ru';
    let qCount = parseInt(localStorage.getItem('qCount') || 0);
    const maxQ = 10;

    // Обновление времени и проверка блокировки
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        const blockUntil = localStorage.getItem('blockUntil');
        if (blockUntil) {
            const diff = blockUntil - new Date().getTime();
            if (diff > 0) {
                document.getElementById('payWall').style.display = 'flex';
                let m = Math.floor(diff / 60000);
                let s = Math.floor((diff % 60000) / 1000);
                document.getElementById('timeLeft').innerText = `Ждать: ${m}м ${s}с`;
            } else {
                unlockCreator();
            }
        }
    }, 1000);

    function unlockCreator() {
        localStorage.removeItem('blockUntil');
        localStorage.setItem('qCount', 0);
        qCount = 0;
        document.getElementById('payWall').style.display = 'none';
        document.getElementById('counter').innerText = "Шансов: 10";
    }

    function setL(l, b) {
        curL = l;
        document.querySelectorAll('.btn-l').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
    }

    function copyW() {
        navigator.clipboard.writeText("0x8e44a5C91015Cf76e6ab5CB06A852016A71D7f76");
        alert("Скопировано!");
    }

    async function runAI() {
        let val = document.getElementById('uIn').value.trim();
        const out = document.getElementById('res');
        if (!val) return;

        if (qCount >= maxQ) return;

        qCount++;
        localStorage.setItem('qCount', qCount);
        document.getElementById('counter').innerText = "Шансов: " + (maxQ - qCount);
        out.style.display = "block";
        out.innerText = "Ищу...";

        // 1. Приветствия
        let lowVal = val.toLowerCase();
        if (lowVal === "привет" || lowVal === "hello" || lowVal === "salom") {
            const hi = {ru:"Привет, здравствуйте! Как дела?", en:"Hello! How are you?", uz:"Salom! Ishlaringiz qalay?"};
            out.innerText = hi[curL];
            return;
        }

        // 2. Математика (обрабатываем 1x1, 2*2 и т.д.)
        let calcExpr = val.replace(/×/g, '*').replace(/x/g, '*').replace(/÷/g, '/').replace(/,/g, '.');
        if (/^[0-9+\-*/().\s*]+$/.test(calcExpr) && /[0-9]/.test(calcExpr)) {
            try {
                out.innerText = "Результат: " + eval(calcExpr);
                return;
            } catch(e) {}
        }

        // 3. Википедия
        const lang = curL === 'uz' ? 'uz' : (curL === 'en' ? 'en' : 'ru');
        try {
            const r = await fetch(`https://${lang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(val)}?origin=*`);
            const d = await r.json();
            out.innerHTML = d.extract ? `<b>${d.title}</b><br>${d.extract}` : "Ничего не найдено.";
        } catch(e) {
            out.innerText = "Ошибка поиска.";
        }

        if (qCount >= maxQ) localStorage.setItem('blockUntil', new Date().getTime() + 3600000);
    }
    
    document.getElementById('counter').innerText = "Шансов: " + (maxQ - qCount);
</script>
</body>
</html>
