<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdugani AI Pro Max - Fixed</title>
    <style>
        :root { --blue: #00d2ff; --purple: #9d00ff; --glass: rgba(10, 10, 20, 0.9); }
        body { margin: 0; background: #020205; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .grid-bg { position: absolute; width: 200%; height: 200%; background-image: linear-gradient(rgba(0, 210, 255, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 210, 255, 0.1) 1px, transparent 1px); background-size: 50px 50px; transform: perspective(500px) rotateX(60deg); z-index: -1; bottom: -50%; animation: move 10s linear infinite; }
        @keyframes move { from { background-position: 0 0; } to { background-position: 0 500px; } }
        .pro-card { width: 90%; max-width: 450px; background: var(--glass); backdrop-filter: blur(25px); border-radius: 40px; border: 2px solid var(--blue); padding: 40px 20px; text-align: center; transition: 0.5s; }
        .status-icon { width: 100px; height: 100px; background: linear-gradient(135deg, var(--blue), var(--purple)); border-radius: 30px; margin: 0 auto 20px; display: flex; justify-content: center; align-items: center; font-size: 50px; transition: 0.5s; }
        .dead { background: #333 !important; filter: grayscale(1); }
        .success { background: linear-gradient(135deg, #ff007f, #ffcc00) !important; }
        input { width: 100%; padding: 18px; border-radius: 20px; border: 1px solid var(--blue); background: rgba(0,0,0,0.6); color: white; font-size: 16px; outline: none; box-sizing: border-box; }
        .btn-pro { width: 100%; margin-top: 15px; padding: 18px; border-radius: 20px; border: none; background: linear-gradient(90deg, var(--blue), var(--purple)); color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
        #response { margin-top: 25px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 20px; text-align: left; display: none; border-left: 4px solid var(--blue); font-size: 15px; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="grid-bg"></div>

<div class="pro-card" id="mainCard">
    <div class="status-icon" id="emoji">🤖</div>
    <h1 style="margin:0; font-size:22px;">Abdugani AI Pro Max</h1>
    <div style="color:var(--blue); font-size:10px; margin-bottom:20px;">ONLINE SYSTEM</div>
    
    <input type="text" id="userInput" placeholder="Напиши что-нибудь...">
    <button class="btn-pro" onclick="askAI()">ОТПРАВИТЬ</button>
    
    <div id="response"></div>
</div>

<script>
    async function askAI() {
        const input = document.getElementById('userInput');
        const box = document.getElementById('response');
        const emoji = document.getElementById('emoji');
        const card = document.getElementById('mainCard');
        const val = input.value.trim();
        const low = val.toLowerCase();

        if (!val) return;

        // СБРОС СОСТОЯНИЯ (Оживает)
        emoji.innerText = "🤔";
        emoji.className = "status-icon";
        card.style.borderColor = "#00d2ff";
        box.style.display = "none";

        // 1. ПРОВЕРКА ПРОСТЫХ ВОПРОСОВ (БЕЗ ИНТЕРНЕТА)
        let simpleReply = "";
        if (low.includes("привет")) simpleReply = "Привет! Я Abdugani AI Pro Max. Готова к работе! ✨";
        else if (low.includes("как дела")) simpleReply = "У меня всё отлично! Анализирую данные, жду твоих команд. 😊";
        else if (low.includes("кто ты")) simpleReply = "Я — умный робот Abdugani AI Pro Max. Твой личный помощник! 🤖";

        if (simpleReply) {
            setTimeout(() => {
                showSuccess(emoji, box, card, simpleReply);
            }, 600);
            input.value = "";
            return;
        }

        // 2. ПОИСК В ИНТЕРНЕТЕ
        try {
            const r = await fetch(`https://wikipedia.org{encodeURIComponent(val)}?origin=*`);
            const d = await r.json();

            if (d.extract && d.type !== "no-extract") {
                showSuccess(emoji, box, card, `<b>${d.title}</b><br><br>${d.extract}`);
            } else {
                showDeath(emoji, box, card);
            }
        } catch {
            showDeath(emoji, box, card);
        }
        input.value = "";
    }

    function showSuccess(emoji, box, card, text) {
        emoji.innerText = "👧";
        emoji.className = "status-icon success";
        box.style.display = "block";
        box.innerHTML = text;
        card.style.borderColor = "#ff007f";
    }

    function showDeath(emoji, box, card) {
        emoji.innerText = "⚰️";
        emoji.className = "status-icon dead";
        box.style.display = "block";
        box.innerHTML = "<center>Информация не найдена.<br>[ СИСТЕМА ПОГИБЛА ]</center>";
        card.style.borderColor = "#333";
    }
</script>
</body>
</html>
