<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdugani AI Pro Max - Emotions</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d00ff;
            --glass: rgba(10, 10, 20, 0.9);
        }
        body {
            margin: 0;
            background: #020205;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            transition: background 0.5s;
        }
        .grid-bg {
            position: absolute; width: 200%; height: 200%;
            background-image: linear-gradient(rgba(0, 210, 255, 0.1) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 210, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px; transform: perspective(500px) rotateX(60deg);
            z-index: -1; bottom: -50%; animation: move-grid 10s linear infinite;
        }
        @keyframes move-grid { from { background-position: 0 0; } to { background-position: 0 500px; } }

        .pro-card {
            width: 90%; max-width: 450px; background: var(--glass);
            backdrop-filter: blur(25px); border-radius: 40px;
            border: 2px solid var(--neon-blue); padding: 40px 20px;
            text-align: center; box-shadow: 0 0 40px rgba(0, 210, 255, 0.2);
            transition: all 0.5s;
        }

        /* Эмоциональный стикер */
        .status-icon {
            width: 120px; height: 120px;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            border-radius: 30px; margin: 0 auto 20px;
            display: flex; justify-content: center; align-items: center;
            font-size: 60px; box-shadow: 0 0 20px var(--neon-blue);
            transition: all 0.5s;
        }

        /* Состояния */
        .dead { background: #333 !important; box-shadow: 0 0 20px #000 !important; filter: grayscale(1); }
        .success { background: linear-gradient(135deg, #ff007f, #ffcc00) !important; box-shadow: 0 0 30px #ff007f !important; }

        input {
            width: 100%; padding: 18px; border-radius: 20px;
            border: 1px solid var(--neon-blue); background: rgba(0,0,0,0.6);
            color: white; font-size: 16px; outline: none; box-sizing: border-box;
        }

        .btn-pro {
            width: 100%; margin-top: 15px; padding: 18px; border-radius: 20px;
            border: none; background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            color: white; font-weight: bold; font-size: 18px; cursor: pointer;
        }

        #response {
            margin-top: 25px; padding: 15px; background: rgba(255,255,255,0.05);
            border-radius: 20px; text-align: left; display: none;
            border-left: 4px solid var(--neon-blue); font-size: 15px;
        }
    </style>
</head>
<body>

<div class="grid-bg"></div>

<div class="pro-card" id="mainCard">
    <div class="status-icon" id="emoji">🤖</div>
    <h1 style="margin:0; font-size:22px;">Abdugani AI Pro Max</h1>
    <div style="color:var(--neon-blue); font-size:10px; margin-bottom:20px; letter-spacing:2px;">EMOTIONAL ENGINE</div>
    
    <input type="text" id="userInput" placeholder="Спроси меня о чем-нибудь...">
    <button class="btn-pro" onclick="askAI()">АНАЛИЗИРОВАТЬ</button>
    
    <div id="response"></div>
</div>

<script>
    async function askAI() {
        const input = document.getElementById('userInput');
        const box = document.getElementById('response');
        const emoji = document.getElementById('emoji');
        const card = document.getElementById('mainCard');
        const val = input.value.trim();

        if (!val) return;

        // ЭМОЦИЯ: ДУМАЕТ 🤔
        box.style.display = "none";
        emoji.innerText = "🤔";
        emoji.className = "status-icon"; 
        input.value = "";

        try {
            const response = await fetch(`https://wikipedia.org{encodeURIComponent(val)}?origin=*`);
            const data = await response.json();

            if (data.extract) {
                // ЭМОЦИЯ: НАШЁЛ — ДЕВОЧКА 👧
                emoji.innerText = "👧";
                emoji.classList.add("success");
                box.style.display = "block";
                box.innerHTML = `<strong>${data.title}</strong><br><br>${data.extract}`;
                card.style.borderColor = "#ff007f";
            } else {
                // ЭМОЦИЯ: НЕ НАШЁЛ — УМЕР ⚰️
                killAI(emoji, box, card);
            }
        } catch {
            killAI(emoji, box, card);
        }
    }

    function killAI(emoji, box, card) {
        emoji.innerText = "⚰️";
        emoji.className = "status-icon dead";
        box.style.display = "block";
        box.innerHTML = "<center style='color:#666;'>[ СИСТЕМА ПОГИБЛА ]<br>Запрос не найден в этой реальности.</center>";
        card.style.borderColor = "#333";
    }
</script>

</body>
</html>
