<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdugani AI Pro Max 3</title>
    <style>
        :root { 
            --gold: #ffd700; 
            --neon-blue: #00f2fe; 
            --neon-purple: #bc13fe; 
            --dark-bg: #020204; 
        }
        body { margin: 0; background: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; overflow-x: hidden; }
        
        .wallet-header { 
            background: rgba(0, 242, 254, 0.05); 
            border: 1px solid var(--neon-blue); 
            padding: 12px 20px; 
            border-radius: 12px; 
            font-family: monospace; 
            font-size: 11px; 
            color: var(--neon-blue); 
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
            z-index: 10;
        }

        .main-card { 
            width: 100%; 
            max-width: 480px; 
            background: rgba(10, 10, 20, 0.95);
            border-radius: 40px; 
            border: 2px solid var(--neon-blue); 
            padding: 40px 30px; 
            text-align: center;
            position: relative;
            box-shadow: 0 0 60px rgba(0, 242, 254, 0.2);
        }

        /* САМЫЙ МОЩНЫЙ РОБОТ-СТИКЕР */
        .robot-sticker {
            width: 180px;
            height: 180px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 20px var(--neon-blue));
            animation: robot-float 4s infinite ease-in-out;
            user-select: none;
        }

        @keyframes robot-float {
            0%, 100% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 20px var(--neon-blue)); }
            50% { transform: translateY(-15px) scale(1.05); filter: drop-shadow(0 0 40px var(--neon-purple)); }
        }

        h1 { 
            font-size: 28px; 
            margin: 10px 0 5px 0; 
            font-weight: 900;
            background: linear-gradient(90deg, #fff, var(--neon-blue), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .version-badge {
            color: var(--gold);
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 5px;
            margin-bottom: 30px;
            display: block;
        }

        input { 
            width: 100%; 
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid var(--neon-blue); 
            background: rgba(0, 0, 0, 0.8); 
            color: white; 
            font-size: 16px; 
            margin-bottom: 20px; 
            outline: none; 
            box-sizing: border-box;
        }

        .btn-go { 
            width: 100%; 
            padding: 20px; 
            border-radius: 15px; 
            border: none; 
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple)); 
            color: white; 
            font-weight: bold; 
            font-size: 18px; 
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-go:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0, 242, 254, 0.4); }

        #resultBox { 
            margin-top: 30px; 
            text-align: left; 
            background: rgba(255, 255, 255, 0.05); 
            border-radius: 20px; 
            padding: 25px; 
            display: none; 
            border-left: 5px solid var(--gold);
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .search-title { color: var(--gold); font-weight: bold; display: block; margin-bottom: 10px; font-size: 18px; }
    </style>
</head>
<body>

    <div class="wallet-header">
        HOST_NODE: 0x8e44a5C91015Cf76e6ab5CB06A852016A71D7f76
    </div>

    <div class="main-card">
        <!-- Стикер самого мощного робота -->
        <img src="https://flaticon.com" alt="Power Robot" class="robot-sticker">

        <h1>Abdugani AI</h1>
        <span class="version-badge">PRO MAX 3</span>
        
        <input type="text" id="query" placeholder="SCANNING GLOBAL NETWORK...">
        <button class="btn-go" onclick="search()">ACTIVATE ANALYSIS</button>
        
        <div id="resultBox"></div>
    </div>

<script>
    async function search() {
        const queryInput = document.getElementById('query');
        const query = queryInput.value.trim();
        const box = document.getElementById('resultBox');
        
        if (!query) return;

        box.style.display = "block";
        box.innerHTML = "<i>SYSTEM: Analyzing datastreams...</i>";

        if (query.toLowerCase().includes("привет")) {
            showResult("COMMAND_CENTER", "Доступ разрешен. Приветствую, создатель! Abdugani AI Pro Max 3 в полной боевой готовности.");
            return;
        }

        try {
            const response = await fetch(`https://wikipedia.org{encodeURIComponent(query)}?origin=*`);
            const data = await response.json();

            if (data.extract) {
                showResult(data.title, data.extract);
            } else {
                showResult("LOG_REPORT", `Данные по запросу "${query}" обработаны. Прямых совпадений в архивах нет, поиск продолжается в фоновом режиме.`);
            }
        } catch (e) {
            showResult("CORE_ERROR", "Связь с сервером прервана. Переподключение...");
        }
        queryInput.value = "";
    }

    function showResult(title, text) {
        const box = document.getElementById('resultBox');
        const content = `<span class="search-title">>> ${title}</span><div>${text}</div>`;
        box.innerHTML = content;
        localStorage.setItem('lastAbduganiRes', content);
    }

    window.onload = () => {
        const saved = localStorage.getItem('lastAbduganiRes');
        if (saved) {
            const box = document.getElementById('resultBox');
            box.style.display = "block";
            box.innerHTML = saved;
        }
    }
</script>
</body>
</html>
