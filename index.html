<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdugani AI Pro Max 3 - Gaming Edition</title>
    <style>
        :root { --blue: #4285f4; --purple: #9b72cb; --bg: #0a0a0c; --card: #1e1f20; --green: #00ff88; }
        body { margin: 0; background: var(--bg); color: #e3e3e3; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        
        .wallet-top { margin-top: 15px; font-family: monospace; font-size: 10px; color: var(--blue); border: 1px solid rgba(66, 133, 244, 0.3); padding: 5px 15px; border-radius: 20px; }
        
        .container { width: 95%; max-width: 650px; margin-top: 40px; text-align: center; }
        
        .ai-title { font-size: 32px; font-weight: bold; margin-bottom: 20px; background: linear-gradient(90deg, #4285f4, #9b72cb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* КНОПКА СИСТЕМА ИГР */
        .game-btn {
            background: linear-gradient(45deg, #00ff88, #0088ff);
            color: black; border: none; padding: 15px 35px; border-radius: 50px;
            font-weight: bold; font-size: 14px; cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3); text-transform: uppercase;
            transition: 0.3s; margin-bottom: 25px; display: inline-flex; align-items: center; gap: 10px;
        }
        .game-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px var(--green); }

        .search-area { background: var(--card); border-radius: 32px; padding: 8px 20px; display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        
        input { flex: 1; background: transparent; border: none; color: white; padding: 15px; font-size: 16px; outline: none; }
        
        .go-btn { background: none; border: none; cursor: pointer; color: var(--blue); font-size: 24px; }
        
        #output { margin-top: 20px; text-align: left; padding: 25px; border-radius: 24px; background: rgba(255,255,255,0.03); display: none; line-height: 1.7; border-left: 5px solid var(--blue); }

        /* Игровое окно */
        #game-center {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 10000; flex-direction: column;
        }
        .game-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <!-- Игровой Центр -->
    <div id="game-center">
        <div class="game-header">
            <span style="font-weight: bold; color: var(--green);">ЛУЧШИЕ ИГРЫ ОНЛАЙН</span>
            <button onclick="closeGames()" style="background: red; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer;">ВЕРНУТЬСЯ К АИ</button>
        </div>
        <!-- Платформа с тысячами лучших игр (Poki) -->
        <iframe src="https://poki.com" id="game-frame"></iframe>
    </div>

    <div class="wallet-top">0x8e44a5C91015Cf76e6ab5CB06A852016A71D7f76</div>

    <div class="container">
        <div class="ai-title">Abdugani AI Pro Max 3</div>
        
        <!-- Твоя новая Система Игр -->
        <button class="game-btn" onclick="openGames()">🎮 СИСТЕМА ИГР</button>

        <div class="search-area">
            <input type="text" id="query" placeholder="Спроси, посчитай или найди человека..." onkeypress="if(event.key==='Enter') startSearch()">
            <button class="go-btn" onclick="startSearch()">✦</button>
        </div>

        <div id="output"></div>
    </div>

<script>
    function openGames() {
        document.getElementById('game-center').style.display = 'flex';
    }
    function closeGames() {
        document.getElementById('game-center').style.display = 'none';
    }

    async function startSearch() {
        const input = document.getElementById('query');
        const box = document.getElementById('output');
        const val = input.value.trim();
        if (!val) return;

        box.style.display = "block";
        box.innerHTML = "<i>Abdugani AI анализирует сеть...</i>";
        
        // Математика
        const mathCheck = val.replace(/,/g, '.').match(/^[0-9+\-*/().\s^%]+$/);
        if (mathCheck && /[0-9]/.test(val)) {
            try {
                const res = eval(val.replace(/\^/g, '**'));
                box.innerHTML = `<b style="color:var(--green)">Результат:</b> <span style="font-size:22px">${res}</span>`;
                input.value = ""; return;
            } catch(e) {}
        }

        // Поиск
        try {
            const r = await fetch(`https://wikipedia.org{encodeURIComponent(val)}?origin=*`);
            const d = await r.json();
            if (d.extract) {
                box.innerHTML = `<h2 style="color:var(--blue); margin:0 0 10px 0;">${d.title}</h2>${d.extract}`;
            } else {
                box.innerHTML = "Информация не найдена. Попробуй другой запрос!";
            }
        } catch (e) {
            box.innerHTML = "Ошибка связи с интернетом.";
        }
        input.value = "";
    }
</script>
</body>
</html>
