<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabbit-Cat AI Premium</title>
    <style>
        :root {
            --neon-blue: #00f2fe;
            --neon-purple: #bc13fe;
            --dark-bg: #08080c;
        }
        body {
            margin: 0;
            background: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Твой кошелек в самом верху */
        .wallet-header {
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed var(--neon-blue);
            padding: 10px 20px;
            border-radius: 15px;
            font-family: monospace;
            font-size: 12px;
            color: var(--neon-blue);
            margin-bottom: 30px;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.1);
        }

        .main-card {
            width: 100%;
            max-width: 480px;
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .avatar { font-size: 50px; margin-bottom: 10px; }
        
        h1 { 
            font-size: 22px; 
            margin: 0 0 20px 0; 
            letter-spacing: 1px;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.4);
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
            outline: none;
            box-sizing: border-box;
        }

        .btn-go {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: none;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
        }

        #resultBox {
            margin-top: 25px;
            text-align: left;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 20px;
            display: none;
            border-left: 4px solid var(--neon-purple);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .search-title { color: var(--neon-blue); font-weight: bold; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

    <!-- Твой кот 0x8 -->
    <div class="wallet-header">
        MY CAT: 0x8e44a5C91015Cf76e6ab5CB06A852016A71D7f76
    </div>

    <div class="main-card">
        <div class="avatar">🐰🐱</div>
        <h1>RABBIT-CAT INTELLIGENCE</h1>
        
        <input type="text" id="query" placeholder="Введите ваш вопрос...">
        <button class="btn-go" onclick="search()">ПОИСК В СЕТИ</button>
        
        <div id="resultBox"></div>
    </div>

<script>
    async function search() {
        const query = document.getElementById('query').value.trim();
        const box = document.getElementById('resultBox');
        
        if (!query) return;

        box.style.display = "block";
        box.innerHTML = "<i>Заяц-Кот сканирует интернет...</i>";

        try {
            // Поиск через Wikipedia API
            const response = await fetch(`https://wikipedia.org{encodeURIComponent(query)}?origin=*`);
            const data = await response.json();

            if (data.extract) {
                const content = `
                    <span class="search-title">${data.title}</span>
                    <div>${data.extract}</div>
                `;
                box.innerHTML = content;
                localStorage.setItem('lastAIResponse', content);
            } else {
                box.innerHTML = "Ничего не найдено. Попробуйте другое слово.";
            }
        } catch (e) {
            box.innerHTML = "Ошибка подключения к сети.";
        }
    }

    // Сохранение ответа при перезагрузке
    window.onload = () => {
        const saved = localStorage.getItem('lastAIResponse');
        if (saved) {
            const box = document.getElementById('resultBox');
            box.style.display = "block";
            box.innerHTML = saved;
        }
    }
</script>

</body>
</html>
