<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Rabbit-Cat AI</title>
    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00f2fe;
            --glass: rgba(255, 255, 255, 0.1);
        }
        body {
            margin: 0;
            background: #050505;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        /* Фон с анимацией */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--neon-pink);
            filter: blur(150px);
            border-radius: 50%;
            z-index: -1;
            animation: move 10s infinite alternate;
        }
        @keyframes move {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }

        .main-card {
            width: 90%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 2px solid var(--neon-blue);
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.2);
        }

        .avatar {
            font-size: 60px;
            margin-bottom: 10px;
            display: inline-block;
            filter: drop-shadow(0 0 10px var(--neon-blue));
        }

        h1 {
            font-size: 24px;
            margin: 10px 0;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status {
            font-size: 12px;
            color: #00ff88;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus { border-color: var(--neon-pink); box-shadow: 0 0 15px rgba(255,0,255,0.3); }

        .btn-search {
            width: 100%;
            margin-top: 15px;
            padding: 18px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-pink));
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-search:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--neon-pink); }

        #response {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            text-align: left;
            max-height: 250px;
            overflow-y: auto;
            display: none;
            border-left: 3px solid var(--neon-pink);
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="main-card">
    <div class="avatar">🐰🐱</div>
    <h1>Rabbit-Cat AI</h1>
    <div class="status">● Безлимитный доступ</div>
    
    <input type="text" id="userInput" placeholder="Спроси что угодно у Зайца-Кота...">
    <button class="btn-search" onclick="askAI()">НАЙТИ ОТВЕТ</button>
    
    <div id="response"></div>
</div>

<script>
    async function askAI() {
        const input = document.getElementById('userInput');
        const box = document.getElementById('response');
        const val = input.value.trim();

        if (!val) return;

        box.style.display = "block";
        box.innerHTML = "<i>Заяц-Кот ищет в интернете...</i>";
        input.value = "";

        try {
            // Поиск через Wikipedia API (как пример реального поиска)
            const response = await fetch(`https://wikipedia.org{encodeURIComponent(val)}?origin=*`);
            const data = await response.json();

            if (data.extract) {
                box.innerHTML = `<strong>${data.title}</strong><br><br>${data.extract}`;
            } else {
                box.innerHTML = "Заяц-Кот не нашел точного ответа, но он уверен, что это что-то интересное! Попробуй другой запрос.";
            }
        } catch (err) {
            box.innerHTML = "Ошибка связи с космосом. Попробуй еще раз!";
        }
        
        // Сохраняем последний ответ, чтобы не пропадал при обновлении
        localStorage.setItem('lastSavedAnswer', box.innerHTML);
    }

    // Восстановление после перезагрузки
    window.onload = () => {
        const saved = localStorage.getItem('lastSavedAnswer');
        if (saved) {
            const box = document.getElementById('response');
            box.style.display = "block";
            box.innerHTML = saved;
        }
    };
</script>

</body>
</html>
