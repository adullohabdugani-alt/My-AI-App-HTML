<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Abdugani AI - Поддержите проект!">
    <link rel="icon" href="https://flaticon.com" type="image/png">
    <title>Abdugani AI PRO</title>
    <style>
        :root { --blue: #00f2fe; --purple: #9d00ff; --dark: #0a0a12; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; box-sizing: border-box; }
        .card { width: 100%; max-width: 450px; background: rgba(255,255,255,0.05); padding: 30px 20px; border-radius: 35px; border: 1px solid var(--blue); text-align: center; backdrop-filter: blur(15px); }
        .title { font-size: 24px; font-weight: 900; margin-bottom: 20px; text-transform: uppercase; }
        .title span { color: var(--purple); }
        .row { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .btn-l { background: transparent; border: 1px solid var(--blue); color: white; padding: 8px 15px; border-radius: 12px; cursor: pointer; }
        .btn-l.active { background: var(--blue); color: black; font-weight: bold; }
        input { width: 100%; padding: 15px; border-radius: 25px; border: none; font-size: 16px; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        .go { width: 100%; padding: 16px; border-radius: 25px; border: none; background: linear-gradient(45deg, var(--blue), var(--purple)); color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
        
        /* КНОПКА ОПЛАТЫ */
        .pay-btn { margin-top: 20px; background: #ffcc00; color: #000; border: none; padding: 10px 20px; border-radius: 15px; font-weight: bold; cursor: pointer; width: 100%; }
        
        /* ОКНО ОПЛАТЫ (МОДАЛЬНОЕ) */
        #payModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a2e; border: 2px solid var(--purple); padding: 25px; border-radius: 25px; z-index: 100; width: 80%; max-width: 350px; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.9); }
        .close-pay { margin-top: 15px; color: var(--blue); cursor: pointer; display: block; font-weight: bold; }
        .pay-info { background: #000; padding: 15px; border-radius: 15px; margin: 15px 0; font-family: monospace; color: #00f2fe; font-size: 18px; border: 1px dashed var(--purple); }
        
        .out { margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.5); border-radius: 15px; border-left: 5px solid var(--blue); text-align: left; display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="title">ABDUGANI <span>AI VIP</span></div>
    <div class="row">
        <button class="btn-l active" onclick="setL('ru', this)">RU</button>
        <button class="btn-l" onclick="setL('uz', this)">UZ</button>
    </div>

    <input type="text" id="uIn" placeholder="Спроси меня...">
    <button class="go" onclick="runAI()">УЗНАТЬ (GO)</button>
    
    <div class="out" id="res"></div>

    <!-- Кнопка вызова оплаты -->
    <button class="pay-btn" onclick="openPay()">💰 ПОДДЕРЖАТЬ ПРОЕКТ</button>
</div>

<!-- Само окно оплаты -->
<div id="payModal">
    <h2 style="color:white; margin:0;">Оплата VIP</h2>
    <p style="color:#ccc; font-size:14px;">Для активации всех функций или доната переведите <b>5,000$</b> (или любую сумму) на карту:</p>
    
    <div class="pay-info" id="cardNumber">8600 0000 0000 0000</div>
    
    <p style="color:var(--purple); font-size:12px;">После оплаты пришлите скриншот разработчику!</p>
    <span class="close-pay" onclick="closePay()">ЗАКРЫТЬ</span>
</div>

<script>
    let curL = 'ru';
    function setL(l, b) {
        curL = l;
        document.querySelectorAll('.btn-l').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
    }

    function openPay() { document.getElementById('payModal').style.display = 'block'; }
    function closePay() { document.getElementById('payModal').style.display = 'none'; }

    function runAI() {
        const val = document.getElementById('uIn').value.toLowerCase();
        const out = document.getElementById('res');
        out.style.display = "block";
        out.innerText = (curL === 'ru' ? "Я думаю над ответом..." : "Javobni o'ylayapman...");
    }
</script>

</body>
</html>
