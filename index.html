<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abdugani AI Ultimate</title>
    <style>
        :root { --blue: #00f2fe; --purple: #9d00ff; --dark: #0a0a12; }
        body { margin: 0; background: var(--dark); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; box-sizing: border-box; }
        .card { width: 100%; max-width: 450px; background: rgba(255,255,255,0.05); padding: 30px 20px; border-radius: 35px; border: 1px solid var(--blue); text-align: center; backdrop-filter: blur(15px); position: relative; overflow: hidden; }
        .row { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .btn-l { background: transparent; border: 1px solid var(--blue); color: white; padding: 8px 15px; border-radius: 12px; cursor: pointer; }
        .btn-l.active { background: var(--blue); color: black; font-weight: bold; }
        input { width: 100%; padding: 15px; border-radius: 25px; border: none; font-size: 16px; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        .go { width: 100%; padding: 16px; border-radius: 25px; border: none; background: linear-gradient(45deg, var(--blue), var(--purple)); color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
        .out { margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.5); border-radius: 15px; border-left: 4px solid var(--blue); text-align: left; display: none; line-height: 1.6; }
        #payWall { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a12; z-index: 10; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; border: 2px solid var(--purple); }
        .wallet-box { background: #000; padding: 10px; border-radius: 10px; font-size: 10px; color: var(--blue); margin: 15px 0; cursor: pointer; word-break: break-all; border: 1px dashed var(--blue); }
    </style>
</head>
<body>

<div class="card">
    <div style="color:var(--blue); margin-bottom:10px; font-family:monospace;" id="clock">00:00:00</div>
    <div id="counter" style="font-size: 12px; color: #ccc; margin-bottom: 10px;">Вопросов осталось: 10</div>

    <div class="row">
        <button class="btn-l active" onclick="setL('ru', this)">RU</button>
        <button class="btn-l" onclick="setL('uz', this)">UZ</button>
        <button class="btn-l" onclick="setL('en', this)">EN</button>
    </div>

    <input type="text" id="uIn" placeholder="Спроси меня...">
    <button class="go" onclick="runAI()">GO</button>
    <div class="out" id="res"></div>

    <div id="payWall">
        <div style="color:#ff3333; font-weight:bold; font-size:20px;">ЛИМИТ ИСЧЕРПАН</div>
        <p>Для VIP доступа (5,000$) отправьте USDC (BEP20) на кошелек:</p>
        <div class="wallet-box" onclick="copyW()">0x8e44a5C91015Cf76e6ab5CB06A852016A71D7f76</div>
        <button class="go" onclick="location.reload()">Обновить (10 попыток)</button>
    </div>
</div>

<script>
    let curL = 'ru';
    let qCount = 0;
    const maxQ = 10;

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

    function setL(l, b) {
        curL = l;
        document.querySelectorAll('.btn-l').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
    }

    function copyW() {
        navigator.clipboard.writeText("0x8e44a5C91015Cf76e6ab5CB06A852016A71D7f76");
        alert("Адрес скопирован!");
    }

    const brain = {
        "ru": {
            "привет": "Привет! Я Abdugani AI. О чем хочешь узнать?",
            "пирамид": "Секрет пирамид в идеальной математике и труде тысяч людей.",
            "эйнштейн": "Альберт Эйнштейн — физик, создавший теорию относительности.",
            "тесла": "Никола Тесла — гений, подаривший нам переменный ток.",
            "кто ты": "Я — Abdugani AI, твой персональный помощник."
        },
        "uz": {
            "salom": "Salom! Men Abdugani AI. Sizga qanday yordam bera olaman?",
            "exrom": "Exromlar siri ularning aniq matematik hisob-kitoblaridadir.",
            "eynshteyn": "Albert Eynshteyn - nisbiylik nazariyasini kashf etgan buyuk fizik.",
            "tesla": "Nikola Tesla - o'zgaruvchan tokni ixtiro qilgan daho.",
            "kim san": "Men Abdugani AI, sening aqlli yordamchingman."
        },
        "en": {
            "hello": "Hello! I am Abdugani AI. What would you like to know?",
            "pyramid": "The secret of the pyramids lies in their perfect mathematical alignment.",
            "einstein": "Albert Einstein was a genius who created the theory of relativity.",
            "tesla": "Nikola Tesla was the genius behind the alternating current system.",
            "who are you": "I am Abdugani AI, your personal smart assistant."
        }
    };

    function runAI() {
        const val = document.getElementById('uIn').value.toLowerCase().trim();
        const out = document.getElementById('res');
        if (!val) return;

        if (qCount >= maxQ) {
            document.getElementById('payWall').style.display = 'flex';
            return;
        }

        qCount++;
        document.getElementById('counter').innerText = "Вопросов осталось: " + (maxQ - qCount);

        let ans = "";
        let found = false;
        for (let k in brain[curL]) {
            if (val.includes(k)) {
                ans = brain[curL][k];
                found = true; break;
            }
        }

        if (!found) {
            try {
                if (/[0-9]/.test(val)) { ans = (curL==='en'?"Result: ":(curL==='uz'?"Natija: ":"Результат: ")) + eval(val.replace(/[^-0-9+*/.]/g, '')); }
                else { ans = curL==='en'?"I don't know this yet.":(curL==='uz'?"Hali bilmayman.":"Я этого пока не знаю."); }
            } catch { ans = "Error"; }
        }

        out.style.display = "block";
        out.innerText = ans;
    }
</script>
</body>
</html>
