<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abdugani AI - Wallet Edition</title>
    <style>
        :root { --blue: #00f2fe; --purple: #9d00ff; --dark: #0a0a12; }
        body { margin: 0; background: var(--dark); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; box-sizing: border-box; }
        .card { width: 100%; max-width: 450px; background: rgba(255,255,255,0.05); padding: 30px 20px; border-radius: 35px; border: 1px solid var(--blue); text-align: center; backdrop-filter: blur(15px); position: relative; overflow: hidden; box-shadow: 0 0 20px rgba(0,242,254,0.2); }
        .row { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .btn-l { background: transparent; border: 1px solid var(--blue); color: white; padding: 8px 15px; border-radius: 12px; cursor: pointer; }
        .btn-l.active { background: var(--blue); color: black; font-weight: bold; }
        input { width: 100%; padding: 15px; border-radius: 25px; border: 1px solid var(--blue); background: rgba(0,0,0,0.3); color: white; font-size: 16px; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        .go { width: 100%; padding: 16px; border-radius: 25px; border: none; background: linear-gradient(45deg, var(--blue), var(--purple)); color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
        .out { margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.6); border-radius: 15px; border-left: 4px solid var(--purple); text-align: left; display: none; line-height: 1.6; }
        
        #payWall { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #0a0a12; z-index: 999; flex-direction: column; justify-content: center; 
            align-items: center; padding: 25px; text-align: center; box-sizing: border-box;
        }
        .price { color: #ff3333; font-size: 32px; font-weight: bold; margin: 10px 0; }
        .wallet-box { background: #000; padding: 12px; border-radius: 10px; font-size: 10px; color: var(--blue); margin: 15px 0; cursor: pointer; border: 1px dashed var(--blue); word-break: break-all; width: 100%; }
        .timer { color: var(--blue); font-family: monospace; font-size: 18px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div style="color:var(--blue); margin-bottom:10px; font-family:monospace;" id="clock">00:00:00</div>
    <div id="counter" style="font-size: 12px; color: #aaa; margin-bottom: 10px;">Шансов осталось: 10</div>
    
    <div class="row">
        <button class="btn-l active" onclick="setL('ru', this)">RU</button>
        <button class="btn-l" onclick="setL('uz', this)">UZ</button>
        <button class="btn-l" onclick="setL('en', this)">EN</button>
    </div>

    <input type="text" id="uIn" placeholder="Спроси или посчитай...">
    <button class="go" onclick="runAI()">GO</button>
    <div class="out" id="res"></div>

    <div id="payWall">
        <div style="color:#ff3333; font-weight:bold; font-size:20px;">ЛИМИТ ИСЧЕРПАН</div>
        <div class="price">$5,000</div>
        <p style="font-size:13px;">Для VIP доступа отправьте USDC (BEP20) на кошелек или подождите час:</p>
        <div class="wallet-box" onclick="copyW()">0x8e44a5C91015Cf76e6ab5CB06A852016A71D7f76</div>
        <div class="timer" id="timeLeft">01:00:00</div>
        <button class="btn-l" onclick="location.reload()" style="margin-top:20px;">Проверить статус</button>
    </div>
</div>

<script>
    let curL = 'ru';
    let qCount = localStorage.getItem('abdu_qCount') || 0;
    const maxQ = 10;
    const myWallet = "0x8e44a5C91015Cf76e6ab5CB06A852016A71D7f76";

    setInterval(() => { 
        document.getElementById('clock').innerText = new Date().toLocaleTimeString(); 
        updateUI();
    }, 1000);

    function updateUI() {
        const blockUntil = localStorage.getItem('abdu_blockUntil');
        if (blockUntil) {
            const diff = blockUntil - new Date().getTime();
            if (diff > 0) {
                document.getElementById('payWall').style.display = 'flex';
                let m = Math.floor((diff / 1000 / 60) % 60);
                let s = Math.floor((diff / 1000) % 60);
                document.getElementById('timeLeft').innerText = `Разблокировка через: ${m}м ${s}с`;
            } else {
                localStorage.removeItem('abdu_blockUntil');
                localStorage.setItem('abdu_qCount', 0);
                qCount = 0;
                document.getElementById('payWall').style.display = 'none';
            }
        }
        document.getElementById('counter').innerText = "Шансов осталось: " + Math.max(0, maxQ - qCount);
    }

    function setL(l, b) {
        curL = l;
        document.querySelectorAll('.btn-l').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
    }

    function copyW() {
        navigator.clipboard.writeText(myWallet);
        alert("Адрес скопирован!");
    }

    async function runAI() {
        const val = document.getElementById('uIn').value.toLowerCase().trim();
        const out = document.getElementById('res');
        if (!val) return;

        if (qCount >= maxQ) {
            if (!localStorage.getItem('abdu_blockUntil')) {
                localStorage.setItem('abdu_blockUntil', new Date().getTime() + 3600000);
            }
            updateUI();
            return;
        }

        qCount++;
        localStorage.setItem('abdu_qCount', qCount);
        updateUI();

        // Логика ответов
        if (val.includes("привет") || val.includes("здравствуй") || val.includes("hello")) {
            out.innerText = val.includes("hello") ? "Hello! How are you doing?" : "Привет, здравствуйте! Как ваши дела?";
        } else if (/[0-9]/.test(val) && /[-+*/]/.test(val)) {
            try { out.innerText = "Результат: " + eval(val.replace(/[^-0-9+*/.]/g, '')); } catch { out.innerText = "Ошибка в расчете"; }
        } else {
            out.innerText = "Ищу в интернете...";
            const lang = curL === 'uz' ? 'uz' : (curL === 'en' ? 'en' : 'ru');
            try {
                const r = await fetch(`https://${lang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(val)}?origin=*`);
                const d = await r.json();
                out.innerHTML = d.title ? `<b>${d.title}</b><br>${d.extract}` : "Ничего не найдено.";
            } catch { out.innerText = "Ошибка поиска."; }
        }
        out.style.display = "block";
    }
    
    updateUI();
</script>
</body>
</html>
