<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdugani AI PRO</title>
    <style>
        body {
            margin: 0; background: #0a0a12; color: white;
            font-family: sans-serif; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 15px; box-sizing: border-box;
        }
        .container {
            width: 100%; max-width: 400px; background: rgba(255,255,255,0.05);
            padding: 25px; border-radius: 25px; border: 1px solid #00f2fe;
            text-align: center; backdrop-filter: blur(10px);
        }
        .title { font-size: 24px; font-weight: bold; margin-bottom: 20px; color: #00f2fe; }
        .title span { color: #9d00ff; }
        
        input {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            margin-bottom: 15px; font-size: 16px; outline: none; box-sizing: border-box;
        }
        .go-btn {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            background: linear-gradient(45deg, #00f2fe, #9d00ff);
            color: white; font-weight: bold; font-size: 18px; cursor: pointer;
        }
        .output {
            margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.5);
            border-radius: 10px; display: none; text-align: left;
            border-left: 4px solid #00f2fe; word-wrap: break-word;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title">ABDUGANI <span>AI PRO</span></div>
    <input type="text" id="userInput" placeholder="Напиши пример (н-р: 5+5)">
    <button class="go-btn" onclick="askAI()">ОТПРАВИТЬ (GO)</button>
    <div class="output" id="out"></div>
</div>

<script>
    function askAI() {
        const val = document.getElementById('userInput').value;
        const out = document.getElementById('out');
        
        if(!val) return;

        out.style.display = "block";
        
        // Математика
        try {
            if(/[0-9]/.test(val) && /[+*/-]/.test(val)) {
                out.innerText = "Результат: " + eval(val);
            } else {
                out.innerText = "Ты написал: " + val + ". Мой создатель Абдугани скоро научит меня отвечать на это!";
            }
        } catch(e) {
            out.innerText = "Я тебя понял: " + val;
        }
    }
</script>

</body>
</html>
