<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdugani AI Pro Max 3 - Ultimate</title>
    <style>
        :root { --blue: #00d2ff; --purple: #9d00ff; --dark: #050505; --gold: #ffd700; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        
        /* КРИПТО-ПАНЕЛЬ СВЕРХУ */
        .crypto-header {
            width: 100%; max-width: 500px; background: rgba(0, 210, 255, 0.1);
            border: 1px solid var(--blue); padding: 15px; border-radius: 20px;
            margin-bottom: 30px; text-align: center; backdrop-filter: blur(10px);
        }
        .wallet-addr { font-family: monospace; font-size: 11px; color: var(--blue); word-break: break-all; }
        
        .main-card {
            width: 95%; max-width: 550px; background: rgba(20, 20, 25, 0.9);
            border-radius: 40px; padding: 35px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 50px rgba(0,0,0,1); text-align: center;
        }

        .ai-avatar { font-size: 70px; margin-bottom: 10px; animation: glow 2s infinite alternate; }
        @keyframes glow { from { filter: drop-shadow(0 0 10px var(--blue)); } to { filter: drop-shadow(0 0 25px var(--purple)); } }

        h1 { font-size: 28px; margin: 0; font-weight: 900; background: linear-gradient(90deg, var(--blue), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .version { color: var(--gold); font-size: 14px; font-weight: bold; letter-spacing: 5px; display: block; margin-bottom: 30px; }

        .search-box { background: #15151a; border-radius: 25px; padding: 5px 20px; display: flex; align-items: center; border: 1px solid #333; margin-bottom: 20px; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 18px; font-size: 16px; outline: none; }
        .search-btn { background: none; border: none; cursor: pointer; color: var(--blue); font-size: 24px; }

        #output {
            margin-top: 25px; text-align: left; padding: 25px; border-radius: 25px;
            background: rgba(255,255,255,0.03); display: none; line-height: 1.7;
            border-left: 5px solid var(--purple); animation: slideIn 0.4s;
        }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .tag { background: var(--blue); color: black; font-size: 10px; font-weight: bold; padding: 2px 8px; border-radius: 5px; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>

    <div class="crypto-header">
        <div style="font-size: 12px; margin-bottom: 5px; color: var(--gold); font-weight: bold;">ACTIVE WALLET NODE</div>
        <div class="wallet-addr">0x8e44a5C91015Cf76e6ab5CB06A852016A71D7f76</div>
    </div>

    <div class="main-card">
        <div id="ai-icon" class="ai-avatar">🤖</div>
        <h1>Abdugani AI</h1>
        <span class="version">PRO MAX 3</span>

        <div class="search-box">
            <input type="text" id="userInput" placeholder="Спроси, посчитай или найди знаменитость..." onkeypress="if(event.key==='Enter') startAI()">
            <button class="search-btn" onclick="startAI()">✦</button>
        </div>

        <div id="output"></div>
    </div>

<script>
    async function startAI() {
        const input = document.getElementById('userInput');
        const box = document.getElementById('output');
        const icon = document.getElementById('ai-icon');
        const val = input.value.trim();
        
        if (!val) return;

        box.style.display = "block";
        box.innerHTML = "<i>Анализирую глобальные данные...</i>";
        icon.innerText = "🌀";

        const low = val.toLowerCase();

        // 1. МАТЕМАТИЧЕСКИЙ МОЗГ
        const mathCheck = val.replace(/,/g, '.').match(/^[0-9+\-*/().\s^%]+$/);
        if (mathCheck && /[0-9]/.test(val)) {
            try {
                const res = eval(val.replace(/\^/g, '**'));
                setTimeout(() => {
                    icon.innerText = "🔢";
                    box.innerHTML = `<span class="tag">ВЫЧИСЛЕНИЕ</span><br><div style="font-size:30px; color:var(--gold);">${res}</div>`;
                }, 400);
                input.value = ""; return;
            } catch(e) {}
        }

        // 2. ИНТЕРНЕТ ПОИСК (Люди и Факты)
        try {
            const r = await fetch(`https://wikipedia.org{encodeURIComponent(val)}?origin=*`);
            const d = await r.json();
            
            if (d.extract) {
                icon.innerText = "🧐";
                box.innerHTML = `
                    <span class="tag">ИНФОРМАЦИЯ ИЗ СЕТИ</span>
                    <h2 style="color:var(--blue); margin-top:0;">${d.title}</h2>
                    <div>${d.extract}</div>
                `;
            } else {
                icon.innerText = "🤖";
                box.innerHTML = "В моей базе знаний нет точного ответа. Попробуй уточнить запрос (например: Илон Маск).";
            }
        } catch (e) {
            icon.innerText = "⚠️";
            box.innerHTML = "Ошибка связи. Проверь интернет.";
        }
        input.value = "";
    }
</script>

</body>
</html>
