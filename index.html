<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdugani AI Pro Max 3</title>
    <style>
        :root { --blue: #4285f4; --bg: #131314; --card: #1e1f20; }
        body { margin: 0; background: var(--bg); color: #e3e3e3; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        .wallet { font-family: monospace; font-size: 10px; color: var(--blue); margin-bottom: 20px; border: 1px solid rgba(66,133,244,0.3); padding: 5px 15px; border-radius: 20px; }
        .container { width: 100%; max-width: 600px; text-align: center; margin-top: 40px; }
        .title { font-size: 32px; font-weight: bold; margin-bottom: 30px; background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .search-box { background: var(--card); border-radius: 30px; padding: 5px 20px; display: flex; align-items: center; border: 1px solid #333; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 15px; font-size: 16px; outline: none; }
        button { background: none; border: none; color: var(--blue); font-size: 24px; cursor: pointer; }
        #output { margin-top: 30px; text-align: left; padding: 20px; border-radius: 20px; background: rgba(255,255,255,0.03); display: none; line-height: 1.6; border-left: 4px solid var(--blue); }
    </style>
</head>
<body>

    <div class="wallet">0x8e44a5C91015Cf76e6ab5CB06A852016A71D7f76</div>

    <div class="container">
        <div class="title">Abdugani AI Pro Max 3</div>
        
        <div class="search-box">
            <input type="text" id="query" placeholder="Спроси о человеке или факте...">
            <button onclick="askAI()">✦</button>
        </div>

        <div id="output"></div>
    </div>

<script>
    async function askAI() {
        const input = document.getElementById('query');
        const box = document.getElementById('output');
        const q = input.value.trim();
        
        if (!q) return;

        box.style.display = "block";
        box.innerHTML = "<i>Ищу информацию в глобальной сети...</i>";
        
        // 1. Проверка на простые слова
        const low = q.toLowerCase();
        if (low === "привет" || low === "салом") {
            box.innerHTML = "<b>Abdugani AI:</b> Привет! Я на связи. Спроси меня о ком-то знаменитом или о любом научном факте.";
            input.value = ""; return;
        }

        try {
            // 2. Запрос к Wikipedia API с заголовком origin для обхода CORS
            const url = `https://wikipedia.org{encodeURIComponent(q)}?origin=*`;
            const response = await fetch(url);
            
            if (!response.ok) throw new Error();
            
            const data = await response.json();

            if (data.extract) {
                box.innerHTML = `<h2 style="color:#4285f4; margin:0 0 10px 0;">${data.title}</h2>${data.extract}`;
            } else {
                box.innerHTML = `По запросу "<b>${q}</b>" ничего не найдено. Попробуй ввести имя известного человека (например: <i>Леонардо да Винчи</i>).`;
            }
        } catch (err) {
            box.innerHTML = "<b>Ошибка:</b> Не удалось получить данные. Попробуй еще раз или проверь подключение к интернету.";
        }
        input.value = "";
    }
</script>
</body>
</html>
