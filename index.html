<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdugani AI Pro Max 3</title>
    <style>
        :root {
            --tg-bg: #0f1721;
            --tg-card: #1c2733;
            --tg-blue: #2481cc;
            --accent: #00f2fe;
            --gold: #ffd700;
        }

        body {
            margin: 0;
            background-color: var(--tg-bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
        }

        /* Блок кошелька сверху */
        .wallet-info {
            font-family: monospace;
            font-size: 11px;
            color: var(--accent);
            background: rgba(0, 242, 254, 0.1);
            padding: 8px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px dashed var(--accent);
        }

        .card {
            background: var(--tg-card);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Живой стикер робота */
        .sticker-box {
            font-size: 80px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 20px;
            margin: 5px 0;
            color: white;
        }

        .version {
            font-size: 12px;
            color: var(--gold);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            display: block;
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: #242f3d;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 15px;
            border: 1px solid transparent;
        }

        input:focus {
            border-color: var(--tg-blue);
        }

        .btn {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: var(--tg-blue);
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Поле ответа как облачко в ТГ */
        #response {
            margin-top: 25px;
            background: #2b3948;
            padding: 15px;
            border-radius: 15px 15px 15px 0;
            text-align: left;
            display: none;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
            animation: pop 0.3s ease-out;
        }

        @keyframes pop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="wallet-info">
        ID: 0x8e44a5C91015Cf76e6ab5CB06A852016A71D7f76
    </div>

    <div class="card">
        <!-- Анимированный блок стикеров -->
        <div id="sticker" class="sticker-box">🤖</div>
        
        <h1>Abdugani AI</h1>
        <span class="version">Pro Max 3</span>

        <input type="text" id="userInput" placeholder="Напиши сообщение...">
        <button class="btn" onclick="askAbdugani()">ОТПРАВИТЬ</button>

        <div id="response"></div>
    </div>
</div>

<script>
    // Набор эмоций (стикеров)
    const botStickers = {
        normal: "🤖",
        think: "🤔",
        search: "🔍",
        happy: "😎",
        hello: "👋",
        error: "😵"
    };

    async function askAbdugani() {
        const input = document.getElementById('userInput');
        const sticker = document.getElementById('sticker');
        const resBox = document.getElementById('response');
        const text = input.value.trim();

        if (!text) return;

        // Смена на стикер "Думает"
        sticker.innerText = botStickers.think;
        resBox.style.display = "block";
        resBox.innerHTML = "<i>Печатает...</i>";

        const lowText = text.toLowerCase();

        // 1. Быстрые реакции на привет
        if (lowText.includes("привет") || lowText.includes("салом")) {
            setTimeout(() => {
                sticker.innerText = botStickers.hello;
                resBox.innerText = "Привет! Я Abdugani AI Pro Max 3. Чем могу помочь?";
            }, 600);
        } 
        else {
            // 2. Поиск в интернете
            sticker.innerText = botStickers.search;
            try {
                const response = await fetch(`https://wikipedia.org{encodeURIComponent(text)}?origin=*`);
                const data = await response.json();

                if (data.extract) {
                    sticker.innerText = botStickers.happy;
                    resBox.innerHTML = `<b>${data.title}</b><br>${data.extract}`;
                } else {
                    sticker.innerText = botStickers.normal;
                    resBox.innerText = "Я изучил интернет, но по этому запросу точной информации нет. Попробуй другое слово!";
                }
            } catch (e) {
                sticker.innerText = botStickers.error;
                resBox.innerText = "Произошла ошибка при подключении к сети.";
            }
        }
        
        input.value = ""; // Очистка поля
    }
</script>

</body>
</html>
