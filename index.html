<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdugani AI Pro Max 3 - Biography Edition</title>
    <style>
        :root { --accent: #00f2fe; --gold: #ffd700; --bg: #05070a; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        
        .wallet { font-family: monospace; font-size: 10px; color: var(--accent); border: 1px solid var(--accent); padding: 8px; border-radius: 10px; margin-bottom: 20px; background: rgba(0,242,254,0.05); }

        .card { width: 100%; max-width: 450px; background: #11141d; border-radius: 35px; padding: 30px; text-align: center; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

        .robot-sticker { font-size: 80px; margin-bottom: 10px; display: block; animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        h1 { font-size: 22px; margin: 5px 0; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }
        .ver { color: var(--gold); font-size: 12px; font-weight: bold; letter-spacing: 3px; display: block; margin-bottom: 25px; }

        input { width: 100%; padding: 18px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: #1a1f2b; color: white; font-size: 16px; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 18px; border-radius: 15px; border: none; background: linear-gradient(45deg, #0088cc, #00f2fe); color: white; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn:hover { box-shadow: 0 0 20px var(--accent); }

        #res { margin-top: 25px; background: #1a1f2b; padding: 20px; border-radius: 20px; text-align: left; display: none; border-left: 4px solid var(--gold); line-height: 1.6; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .name-tag { color: var(--accent); font-weight: bold; font-size: 18px; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="wallet">NODE: 0x8e44a5C91015Cf76e6ab5CB06A852016A71D7f76</div>

    <div class="card">
        <div id="icon" class="robot-sticker">🤖</div>
        <h1>Abdugani AI</h1>
        <span class="ver">PRO MAX 3</span>

        <input type="text" id="target" placeholder="Введите имя знаменитости...">
        <button class="btn" onclick="findPerson()">НАЙТИ В ИНТЕРНЕТЕ</button>

        <div id="res"></div>
    </div>

<script>
    async function findPerson() {
        const input = document.getElementById('target');
        const icon = document.getElementById('icon');
        const res = document.getElementById('res');
        const name = input.value.trim();

        if (!name) return;

        res.style.display = "block";
        res.innerHTML = "<i>Ищу данные о человеке в глобальной сети...</i>";
        icon.innerText = "🔍";

        try {
            // Поиск биографии через открытый API интернета
            const response = await fetch(`https://wikipedia.org{encodeURIComponent(name)}?origin=*`);
            const data = await response.json();

            if (data.extract) {
                icon.innerText = "😎";
                res.innerHTML = `<span class="name-tag">${data.title}</span>${data.extract}`;
            } else {
                icon.innerText = "🤔";
                res.innerHTML = "Данные об этом человеке не найдены. Попробуйте ввести Имя и Фамилию точнее.";
            }
        } catch (e) {
            icon.innerText = "⚠️";
            res.innerHTML = "Ошибка подключения к интернету.";
        }
        input.value = "";
    }
</script>
</body>
</html>
