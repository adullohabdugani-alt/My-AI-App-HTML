<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abdugani AI - Bio Edition</title>
    <style>
        :root { --blue: #00f2fe; --purple: #9d00ff; --dark: #0a0a12; }
        body { margin: 0; background: var(--dark); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; box-sizing: border-box; overflow: hidden; }
        .card { width: 100%; max-width: 450px; background: rgba(255,255,255,0.05); padding: 30px 20px; border-radius: 35px; border: 1px solid var(--blue); text-align: center; backdrop-filter: blur(15px); position: relative; }
        .row { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .btn-l { background: transparent; border: 1px solid var(--blue); color: white; padding: 8px 15px; border-radius: 12px; cursor: pointer; }
        .btn-l.active { background: var(--blue); color: black; font-weight: bold; }
        input { width: 100%; padding: 15px; border-radius: 25px; border: 1px solid var(--blue); background: rgba(0,0,0,0.3); color: white; font-size: 16px; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        .go { width: 100%; padding: 16px; border-radius: 25px; border: none; background: linear-gradient(45deg, var(--blue), var(--purple)); color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
        .out { margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.6); border-radius: 15px; border-left: 4px solid var(--purple); text-align: left; display: none; line-height: 1.6; }
        
        /* Экран блокировки */
        #payWall { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a12; z-index: 999; flex-direction: column; justify-content: center; align-items: center; padding: 25px; box-sizing: border-box; }
        
        /* СТИЛЬ СЕНСОРА */
        .fingerprint-scanner {
            width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--blue);
            display: flex; align-items: center; justify-content: center; position: relative;
            cursor: pointer; margin-top: 20px; transition: 0.3s;
            background: rgba(0, 242, 254, 0.1);
        }
        .fingerprint-scanner:active { transform: scale(0.9); box-shadow: 0 0 20px var(--blue); }
        .fingerprint-icon { width: 40px; height: 40px; fill: var(--blue); }
        .scan-line {
            width: 100%; height: 2px; background: var(--blue); position: absolute;
            top: 0; left: 0; display: none; box-shadow: 0 0 10px var(--blue);
            animation: scanning 1.5s linear infinite;
        }
        @keyframes scanning { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>

<div class="card">
    <div style="color:var(--blue); margin-bottom:10px; font-family:monospace;" id="clock">00:00:00</div>
    <div id="counter" style="font-size: 12px; color: #aaa; margin-bottom: 15px;">Шансов осталось: 10</div>
    
    <div class="row">
        <button class="btn-l active" onclick="setL('ru', this)">RU</button>
        <button class="btn-l" onclick="setL('uz', this)">UZ</button>
        <button class="btn-l" onclick="setL('en', this)">EN</button>
    </div>

    <input type="text" id="uIn" placeholder="Спроси или посчитай...">
    <button class="go" onclick="runAI()">GO</button>
    <div class="out" id="res"></div>

    <!-- Окно блокировки с СЕНСОРОМ -->
    <div id="payWall">
        <div style="color:#ff3333; font-weight:bold; font-size:20px;">ДОСТУП ОГРАНИЧЕН</div>
        <div style="font-size:28px; margin:5px 0;">$5,000</div>
        <p style="font-size:13px;">Для оплаты скопируйте кошелек:</p>
        <div style="background:#000; padding:10px; border-radius:10px; font-size:10px; color:var(--blue); border:1px dashed var(--blue); word-break:break-all; width:90%;" onclick="copyW()">0x8e44a5C91015Cf76e6ab5CB06A852016A71D7f76</div>
        
        <p style="margin-top:20px; font-size:14px; color:#aaa;">Или подтвердите личность создателя:</p>
        
        <!-- КНОПКА-СЕНСОР -->
        <div class="fingerprint-scanner" id="sensor" onmousedown="startScan()" onmouseup="stopScan()" ontouchstart="startScan()" ontouchend="stopScan()">
            <div class="scan-line" id="line"></div>
            <svg class="fingerprint-icon" viewBox="0 0 24 24"><path d="M17.81 4.47c-.08 0-.16-.02-.23-.06C15.66 3.42 14 3 12.01 3c-1.98 0-3.86.47-5.57 1.41-.24.13-.54.04-.67-.2-.13-.24-.04-.55.2-.68C7.82 2.52 9.86 2 12.01 2c2.13 0 3.99.47 6.03 1.56.24.13.33.43.2.67-.09.16-.26.24-.43.24zm3.14 2.11c-.24-.13-.33-.44-.2-.68.13-.24.44-.33.68-.2.36.19.7.39 1.02.61.22.15.28.45.13.67-.15.22-.45.28-.67.13-.32-.21-.63-.39-.96-.53zM12 11c-.55 0-1-.45-1-1V6c0-.55.45-1 1-1s1 .45 1 1v4c0 .55-.45 1-1 1zm0 10c-2.73 0-5.06-1.61-6.12-3.93-.11-.24-.01-.53.23-.64.24-.11.53-.01.64.23C7.62 18.77 9.64 20 12 20s4.38-1.23 5.25-3.34c.11-.24.4-.34.64-.23.24.11.34.4.23.64-1.06 2.32-3.39 3.93-6.12 3.93z"/></svg>
        </div>
        <p id="scanMsg" style="font-size:12px; color:var(--blue); margin-top:10px;">Приложите палец</p>
    </div>
</div>

<script>
    let curL = 'ru';
    let qCount = 0;
    const maxQ = 10;
    let scanTimer;

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);

    // ЛОГИКА СЕНСОРА
    function startScan() {
        document.getElementById('line').style.display = 'block';
        document.getElementById('scanMsg').innerText = 'Сканирование...';
        scanTimer = setTimeout(() => {
            qCount = 0;
            document.getElementById('payWall').style.display = 'none';
            document.getElementById('counter').innerText = "Шансов осталось: 10";
            alert("Личность подтверждена! Добро пожаловать, Создатель.");
            stopScan();
        }, 3000); // Нужно держать 3 секунды
    }

    function stopScan() {
        clearTimeout(scanTimer);
        document.getElementById('line').style.display = 'none';
        document.getElementById('scanMsg').innerText = 'Приложите палец';
    }

    function setL(l, b) {
        curL = l;
        document.querySelectorAll('.btn-l').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
    }

    function copyW() {
        navigator.clipboard.writeText("0x8e44a5C91015Cf76e6ab5CB06A852016A71D7f76");
        alert("Кошелек скопирован!");
    }

    async function runAI() {
        let val = document.getElementById('uIn').value.trim();
        const out = document.getElementById('res');
        if (!val) return;

        if (qCount >= maxQ) {
            document.getElementById('payWall').style.display = 'flex';
            return;
        }

        qCount++;
        document.getElementById('counter').innerText = "Шансов осталось: " + (maxQ - qCount);
        out.style.display = "block";
        out.innerText = "Думаю...";

        let lowVal = val.toLowerCase();
        if (lowVal === "привет" || lowVal === "hello" || lowVal === "salom") {
            const hi = {ru:"Привет, здравствуйте! Как дела?", en:"Hello! How are you?", uz:"Salom! Ishlaringiz qalay?"};
            out.innerText = hi[curL];
            return;
        }

        let calcExpr = val.replace(/×/g, '*').replace(/x/g, '*').replace(/÷/g, '/').replace(/,/g, '.');
        if (/^[0-9+\-*/().\s*]+$/.test(calcExpr) && /[0-9]/.test(calcExpr)) {
            try { out.innerText = "Результат: " + eval(calcExpr); return; } catch(e) {}
        }

        const lang = curL === 'uz' ? 'uz' : (curL === 'en' ? 'en' : 'ru');
        try {
            const r = await fetch(`https://${lang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(val)}?origin=*`);
            const d = await r.json();
            out.innerHTML = d.extract ? `<b>${d.title}</b><br>${d.extract}` : "Ничего не найдено.";
        } catch(e) { out.innerText = "Ошибка сети."; }
    }
</script>
</body>
</html>
