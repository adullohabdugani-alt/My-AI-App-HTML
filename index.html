<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abdugani AI - Real Search</title>
    <style>
        :root { --blue: #00f2fe; --purple: #9d00ff; --dark: #0a0a12; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; box-sizing: border-box; }
        .card { width: 100%; max-width: 450px; background: rgba(255,255,255,0.05); padding: 30px 20px; border-radius: 35px; border: 1px solid var(--blue); text-align: center; backdrop-filter: blur(15px); box-shadow: 0 0 25px rgba(0, 242, 254, 0.2); }
        .row { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .btn-l { background: transparent; border: 1px solid var(--blue); color: white; padding: 8px 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .btn-l.active { background: var(--blue); color: black; font-weight: bold; }
        input { width: 100%; padding: 15px; border-radius: 25px; border: 1px solid rgba(0,242,254,0.3); background: rgba(255,255,255,0.1); color: white; font-size: 16px; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        .go { width: 100%; padding: 16px; border-radius: 25px; border: none; background: linear-gradient(45deg, var(--blue), var(--purple)); color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
        .out { margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.6); border-radius: 15px; border-left: 4px solid var(--purple); text-align: left; display: none; line-height: 1.6; font-size: 14px; max-height: 350px; overflow-y: auto; }
        .loading { display: none; color: var(--blue); margin-bottom: 10px; font-style: italic; }
        a { color: var(--blue); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div style="color:var(--blue); margin-bottom:10px; font-family:monospace;" id="clock">00:00:00</div>
    
    <div class="row">
        <button class="btn-l active" onclick="setL('ru', this)">RU</button>
        <button class="btn-l" onclick="setL('uz', this)">UZ</button>
        <button class="btn-l" onclick="setL('en', this)">EN</button>
    </div>

    <input type="text" id="uIn" placeholder="Введите запрос...">
    <div id="loader" class="loading">Запрашиваю интернет...</div>
    <button class="go" onclick="askAbdugani()">НАЙТИ ОТВЕТ</button>
    
    <div class="out" id="res"></div>
</div>

<script>
    let curL = 'ru';
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

    function setL(l, b) {
        curL = l;
        document.querySelectorAll('.btn-l').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
        const placeholders = { 'ru': 'О чем хочешь узнать?', 'uz': 'Nima haqida bilmoqchisiz?', 'en': 'What do you want to know?' };
        document.getElementById('uIn').placeholder = placeholders[l];
    }

    async function askAbdugani() {
        const query = document.getElementById('uIn').value.trim();
        const out = document.getElementById('res');
        const loader = document.getElementById('loader');

        if (!query) return;

        loader.style.display = "block";
        out.style.display = "none";

        // Используем Wikipedia API (поддерживает CORS через origin=*)
        const langCode = curL === 'uz' ? 'uz' : (curL === 'en' ? 'en' : 'ru');
        const url = `https://${langCode}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}?origin=*`;

        try {
            const response = await fetch(url);
            if (response.ok) {
                const data = await response.json();
                out.innerHTML = `<strong>${data.title}</strong><br>${data.extract}<br><br><a href="${data.content_urls.desktop.page}" target="_blank">Читать полностью →</a>`;
            } else {
                // Если точной статьи нет, ищем похожие
                const searchUrl = `https://${langCode}.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(query)}&limit=1&namespace=0&format=json&origin=*`;
                const searchRes = await fetch(searchUrl);
                const searchData = await searchRes.json();
                
                if (searchData[1].length > 0) {
                    out.innerHTML = `Точного совпадения нет. Возможно, вы имели в виду: <br><a href="${searchData[3][0]}" target="_blank">${searchData[1][0]}</a>`;
                } else {
                    out.innerHTML = "Ничего не найдено. Попробуйте изменить запрос.";
                }
            }
        } catch (e) {
            out.innerText = "Ошибка доступа к сети. Проверьте интернет!";
        } finally {
            loader.style.display = "none";
            out.style.display = "block";
        }
    }
</script>
</body>
</html>
