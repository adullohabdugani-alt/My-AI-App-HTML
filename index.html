<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abdugani AI - Final Pro</title>
    <style>
        :root { --blue: #00f2fe; --purple: #9d00ff; --dark: #0a0a12; }
        body { margin: 0; background: var(--dark); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; box-sizing: border-box; }
        .card { width: 100%; max-width: 450px; background: rgba(255,255,255,0.05); padding: 30px 20px; border-radius: 35px; border: 1px solid var(--blue); text-align: center; backdrop-filter: blur(15px); position: relative; overflow: hidden; }
        .row { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .btn-l { background: transparent; border: 1px solid var(--blue); color: white; padding: 8px 15px; border-radius: 12px; cursor: pointer; }
        .btn-l.active { background: var(--blue); color: black; font-weight: bold; }
        input { width: 100%; padding: 15px; border-radius: 25px; border: 1px solid var(--blue); background: rgba(0,0,0,0.3); color: white; font-size: 16px; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        .go { width: 100%; padding: 16px; border-radius: 25px; border: none; background: linear-gradient(45deg, var(--blue), var(--purple)); color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
        .out { margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.6); border-radius: 15px; border-left: 4px solid var(--purple); text-align: left; display: none; line-height: 1.6; max-height: 250px; overflow-y: auto; white-space: pre-wrap; font-family: monospace; }
        #payWall { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a12; z-index: 999; flex-direction: column; justify-content: center; align-items: center; padding: 25px; box-sizing: border-box; }
        .timer-val { font-size: 36px; color: var(--blue); font-family: monospace; margin: 15px 0; }
    </style>
</head>
<body>

<div class="card">
    <div style="color:var(--blue); margin-bottom:10px; font-family:monospace;" id="clock">00:00:00</div>
    <div id="counter" style="font-size: 12px; color: #aaa; margin-bottom: 15px;">Шансов осталось: 10</div>
    
    <div class="row">
        <button class="btn-l active" onclick="setL('ru', this)">RU</button>
        <button class="btn-l" onclick="setL('uz', this)">UZ</button>
        <button class="btn-l" onclick="setL('en', this)">EN</button>
    </div>

    <input type="text" id="uIn" placeholder="Спроси или напиши HTML...">
    <button class="go" onclick="runAI()">GO</button>
    <div class="out" id="res"></div>

    <div id="payWall">
        <h2 style="color:#ff3333; margin:0;">ЛИМИТ ИСЧЕРПАН</h2>
        <div style="font-size:32px; margin:10px 0;">$5,000</div>
        <p style="font-size:14px; color:#555;">Доступ откроется через:</p>
        <div id="timeLeft" class="timer-val">01:00:00</div>
        <div style="background:#000; padding:12px; border-radius:15px; font-size:10px; color:var(--blue); border:1px dashed var(--blue); word-break:break-all; width:90%;" onclick="copyW()">
            0x8e44a5C91015Cf76e6ab5CB06A852016A71D7f76
        </div>
    </div>
</div>

<script>
    let curL = 'ru';
    const maxQ = 10;

    // Инициализация данных из памяти
    let qCount = parseInt(localStorage.getItem('abdugani_qCount')) || 0;

    // Главный цикл: часы и проверка блокировки
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        
        const blockUntil = localStorage.getItem('blockTime');
        if (blockUntil) {
            const now = new Date().getTime();
            const diff = parseInt(blockUntil) - now;

            if (diff > 0) {
                document.getElementById('payWall').style.display = 'flex';
                let m = Math.floor(diff / 60000);
                let s = Math.floor((diff % 60000) / 1000);
                document.getElementById('timeLeft').innerText = `${m}м ${s}с`;
            } else {
                // Время вышло — сбрасываем всё
                localStorage.removeItem('blockTime');
                localStorage.setItem('abdugani_qCount', 0);
                qCount = 0;
                document.getElementById('payWall').style.display = 'none';
                updateCounter();
            }
        }
    }, 1000);

    function updateCounter() {
        document.getElementById('counter').innerText = "Шансов осталось: " + (maxQ - qCount);
    }

    function setL(l, b) {
        curL = l;
        document.querySelectorAll('.btn-l').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
    }

    function copyW() {
        navigator.clipboard.writeText("0x8e44a5C91015Cf76e6ab5CB06A852016A71D7f76");
        alert("Кошелек скопирован!");
    }

    async function runAI() {
        const input = document.getElementById('uIn');
        const out = document.getElementById('res');
        let val = input.value.trim();
        
        if (!val || localStorage.getItem('blockTime')) return;

        qCount++;
        localStorage.setItem('abdugani_qCount', qCount);
        updateCounter();
        
        out.style.display = "block";
        out.innerText = "Думаю...";

        let low = val.toLowerCase();

        // 1. Поиск кода
        if (low.includes("код") || low.includes("html")) {
            out.innerText = "<!DOCTYPE html>\n<html>\n<body>\n  <h1>Лучший HTML код</h1>\n</body>\n</html>";
        } 
        // 2. Математика
        else {
            let calc = val.replace(/×/g, '*').replace(/x/g, '*').replace(/÷/g, '/');
            if (/^[0-9+\-*/().\s*]+$/.test(calc) && /[0-9]/.test(calc)) {
                try { out.innerText = "Результат: " + eval(calc); } catch { out.innerText = "Ошибка в примере"; }
            } else {
                // 3. Интернет
                try {
                    const lang = curL === 'uz' ? 'uz' : (curL === 'en' ? 'en' : 'ru');
                    const r = await fetch(`https://${lang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(val)}?origin=*`);
                    const d = await r.json();
                    out.innerHTML = d.extract ? `<b>${d.title}</b><br>${d.extract}` : "Ничего не найдено.";
                } catch { out.innerText = "Ошибка сети."; }
            }
        }

        // Если шансы кончились — ставим блок на 1 час
        if (qCount >= maxQ) {
            const expire = new Date().getTime() + 3600000;
            localStorage.setItem('blockTime', expire);
        }
        input.value = "";
    }

    // Инициализация при запуске
    updateCounter();
    if (localStorage.getItem('blockTime')) {
        document.getElementById('payWall').style.display = 'flex';
    }
</script>
</body>
</html>
