<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abdugani AI - Biometric</title>
    <style>
        :root { --blue: #00f2fe; --purple: #9d00ff; --dark: #0a0a12; }
        body { margin: 0; background: var(--dark); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; box-sizing: border-box; overflow: hidden; }
        .card { width: 100%; max-width: 450px; background: rgba(255,255,255,0.05); padding: 30px 20px; border-radius: 35px; border: 1px solid var(--blue); text-align: center; backdrop-filter: blur(15px); position: relative; }
        .row { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .btn-l { background: transparent; border: 1px solid var(--blue); color: white; padding: 8px 15px; border-radius: 12px; cursor: pointer; }
        .btn-l.active { background: var(--blue); color: black; font-weight: bold; }
        input { width: 100%; padding: 15px; border-radius: 25px; border: 1px solid var(--blue); background: rgba(0,0,0,0.3); color: white; font-size: 16px; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        .go { width: 100%; padding: 16px; border-radius: 25px; border: none; background: linear-gradient(45deg, var(--blue), var(--purple)); color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
        .out { margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.6); border-radius: 15px; border-left: 4px solid var(--purple); text-align: left; display: none; }
        
        #payWall { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a12; z-index: 999; flex-direction: column; justify-content: center; align-items: center; padding: 25px; box-sizing: border-box; }
        
        /* СТИЛЬ СКАНЕРА */
        .scanner-circle {
            width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--blue);
            display: flex; align-items: center; justify-content: center; position: relative;
            margin-top: 20px; background: radial-gradient(circle, rgba(0,242,254,0.2) 0%, transparent 70%);
            box-shadow: 0 0 15px rgba(0,242,254,0.3);
        }
        .scan-anim {
            width: 100%; height: 4px; background: var(--blue); position: absolute;
            top: 0; left: 0; display: none; box-shadow: 0 0 15px var(--blue);
            animation: move 2s linear infinite;
        }
        @keyframes move { 0% { top: 0; } 100% { top: 100%; } }
        .data-log { font-size: 10px; color: #555; font-family: monospace; margin-top: 10px; height: 40px; overflow: hidden; }
    </style>
</head>
<body>

<div class="card">
    <div style="color:var(--blue); margin-bottom:10px; font-family:monospace;" id="clock">00:00:00</div>
    <div id="counter" style="font-size: 12px; color: #aaa; margin-bottom: 10px;">Шансов осталось: 10</div>
    
    <!-- СЕКРЕТНАЯ ЗОНА: Нажатие сюда активирует доступ для сканера -->
    <div class="row" onclick="activateMaster()">
        <button class="btn-l active">RU</button>
        <button class="btn-l">UZ</button>
        <button class="btn-l">EN</button>
    </div>

    <input type="text" id="uIn" placeholder="Спроси или посчитай...">
    <button class="go" onclick="runAI()">GO</button>
    <div class="out" id="res"></div>

    <div id="payWall">
        <h3 style="color:#ff3333; margin:0;">БЛОКИРОВКА СИСТЕМЫ</h3>
        <div style="font-size:24px; color:white; margin:10px 0;">$5,000</div>
        
        <!-- СКАНЕР -->
        <div class="scanner-circle" id="sensor" ontouchstart="startBiometry()" ontouchend="stopBiometry()" onmousedown="startBiometry()" onmouseup="stopBiometry()">
            <div class="scan-anim" id="line"></div>
            <svg style="width:50px; fill:var(--blue);" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
        </div>
        
        <div id="log" class="data-log">Ожидание контакта...</div>
        <p style="font-size:10px; color:#444; margin-top:15px;">Wallet: 0x8e44a5C91015Cf76e6ab5CB06A852016A71D7f76</p>
    </div>
</div>

<script>
    let qCount = 0;
    let masterMode = false;
    let scanProcess;

    function activateMaster() {
        masterMode = true; // Ты нажал на языки — режим профи включен
        setTimeout(() => { masterMode = false; }, 5000); // Режим выключится через 5 сек
    }

    function startBiometry() {
        const log = document.getElementById('log');
        const line = document.getElementById('line');
        line.style.display = 'block';
        
        let steps = ["Инициализация...", "Чтение данных...", "Сверка папиллярных линий...", "Анализ биометрии...", "Проверка ID..."];
        let i = 0;
        
        scanProcess = setInterval(() => {
            log.innerText = steps[i];
            i++;
            if (i >= steps.length) {
                clearInterval(scanProcess);
                if (masterMode) {
                    log.style.color = "#00ff00";
                    log.innerText = "ДАННЫЕ СОВПАДАЮТ. ДОСТУП РАЗРЕШЕН.";
                    setTimeout(() => {
                        qCount = 0;
                        document.getElementById('payWall').style.display = 'none';
                        document.getElementById('counter').innerText = "Шансов осталось: 10";
                        masterMode = false;
                    }, 1500);
                } else {
                    log.style.color = "#ff0000";
                    log.innerText = "ОШИБКА: ДАННЫЕ НЕ СОВПАДАЮТ.";
                }
            }
        }, 800);
    }

    function stopBiometry() {
        clearInterval(scanProcess);
        document.getElementById('line').style.display = 'none';
        document.getElementById('log').innerText = "Контакт прерван.";
        document.getElementById('log').style.color = "#555";
    }

    // Логика работы ИИ
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

    function runAI() {
        let val = document.getElementById('uIn').value.trim();
        if (qCount >= 10) { document.getElementById('payWall').style.display = 'flex'; return; }
        qCount++;
        document.getElementById('counter').innerText = "Шансов осталось: " + (10 - qCount);
        document.getElementById('res').style.display = "block";
        
        // Простая математика
        try {
            let res = eval(val.replace(/×/g, '*').replace(/x/g, '*'));
            document.getElementById('res').innerText = "Результат: " + res;
        } catch {
            document.getElementById('res').innerText = "Поиск: " + val;
        }
    }
</script>
</body>
</html>
